name: Apply Phase 10B source payload

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-10-substrate
    paths:
      - ".phase10b/**"
      - "scripts/apply_phase10b_payload.py"
      - ".github/workflows/apply-phase10b-payload.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Materialize Phase 10B source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v3-phase-10-substrate
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify and apply payload
        run: python scripts/apply_phase10b_payload.py
