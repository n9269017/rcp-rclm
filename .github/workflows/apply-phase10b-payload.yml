name: Apply Phase 10B source payload

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-10-substrate
    paths:
      - ".phase10b/**"
      - "scripts/apply_phase10b_payload.py"
      - ".github/workflows/apply-phase10b-payload.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".phase10b/**"
      - "scripts/apply_phase10b_payload.py"
      - ".github/workflows/apply-phase10b-payload.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Materialize Phase 10B source
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v3-phase-10-substrate
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify and apply payload
        shell: bash
        run: |
          set +e
          python scripts/apply_phase10b_payload.py > "${RUNNER_TEMP}/phase10b-materialize.log" 2>&1
          status=$?
          cat "${RUNNER_TEMP}/phase10b-materialize.log"
          exit "$status"

      - name: Upload materialization diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase10b-materialization-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/phase10b-materialize.log
          if-no-files-found: error
          retention-days: 7
