name: Recover Phase 8 with Python 3.11

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-phase8-with-python.yml"
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-phase-8-independent-replay
    paths:
      - ".github/workflows/apply-phase8-with-python.yml"

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out canonical Phase 8 branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-phase-8-independent-replay
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Recover the validated implementation tree
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/runtime-v2-phase-7.yml
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import io
          import tarfile
          import zlib
          from pathlib import Path, PurePosixPath

          parts = sorted(Path('.').glob('.phase8_payload.part*'))
          if len(parts) != 11:
              raise RuntimeError(f'expected 11 payload parts, found {len(parts)}')
          encoded = ''.join(
              part.read_text(encoding='ascii').strip()
              for part in parts
          ).encode('ascii')
          if len(encoded) != 63988:
              raise RuntimeError(f'unexpected encoded size: {len(encoded)}')
          if hashlib.sha256(encoded).hexdigest() != (
              '1ab20157abab33f5bccb097b63aeda5b283e26ef046d9cbcff578c27c2832d41'
          ):
              raise RuntimeError('encoded payload hash mismatch')

          compressed = base64.b64decode(encoded, validate=True)
          if len(compressed) != 47989:
              raise RuntimeError(f'unexpected compressed size: {len(compressed)}')
          if hashlib.sha256(compressed).hexdigest() != (
              '1baf2c4df74fa7ad745c9918e878f99c866b469540d9d69aa1dddc96b4d46f20'
          ):
              raise RuntimeError('compressed payload hash mismatch')
          if compressed[:10] != b'\x1f\x8b\x08\x00\x00\x00\x00\x00\x02\xff':
              raise RuntimeError('unexpected gzip header')

          decompressor = zlib.decompressobj(-zlib.MAX_WBITS)
          archive_bytes = decompressor.decompress(compressed[10:-8]) + decompressor.flush()
          if not decompressor.eof or decompressor.unused_data:
              raise RuntimeError('raw deflate stream did not close cleanly')
          if len(archive_bytes) != 286720:
              raise RuntimeError(f'unexpected tar size: {len(archive_bytes)}')
          if hashlib.sha256(archive_bytes).hexdigest() != (
              'eb5e12437140dccfe23724dab5f88f16ca868acb674a4b219f24ab83e96ba3ee'
          ):
              raise RuntimeError('recovered tar hash mismatch')

          repository_root = Path.cwd().resolve(strict=True)
          with tarfile.open(fileobj=io.BytesIO(archive_bytes), mode='r:') as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if names != sorted(names, key=lambda value: value.encode('utf-8')):
                  raise RuntimeError('payload members are not canonically ordered')
              if len(names) != len(set(names)):
                  raise RuntimeError('payload contains duplicate paths')
              if len(names) != 31:
                  raise RuntimeError(f'unexpected member count: {len(names)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or not path.parts or '..' in path.parts:
                      raise RuntimeError(f'unsafe payload path: {member.name}')
                  if not member.isfile():
                      raise RuntimeError(
                          f'payload member is not a regular file: {member.name}'
                      )
                  source = archive.extractfile(member)
                  if source is None:
                      raise RuntimeError(
                          f'payload member has no content: {member.name}'
                      )
                  destination = repository_root.joinpath(*path.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(source.read())
                  destination.chmod(0o644)

          script = repository_root / 'scripts/reproduce_run.py'
          source = script.read_text(encoding='utf-8')
          repairs = {
              '"schema_idath(untime.prhase8_reproduction_summary.v2",':
                  '"schema_id": "runtime.phase8_reproduction_summary.v2",',
              '"project_pin_hashathproject.pin_hash,':
                  '"project_pin_hash": project.pin_hash,',
              '"source_guardathsource_guard.to_json(),':
                  '"source_guard": source_guard.to_json(),',
              '"bundle_manifestathbundle.manifest.to_json(),':
                  '"bundle_manifest": bundle.manifest.to_json(),',
              '"replay_reportathevidence.report.to_json(),':
                  '"replay_report": evidence.report.to_json(),',
              '"generator_invocationsathevidence.report.generator_invocations,':
                  '"generator_invocations": evidence.report.generator_invocations,',
              '"generator_modules_loadedath[],':
                  '"generator_modules_loaded": [],',
              'raise Rntime.Error(': 'raise RuntimeError(',
          }
          for damaged, repaired in repairs.items():
              if source.count(damaged) != 1:
                  raise RuntimeError(f'unexpected repair occurrence count: {damaged}')
              source = source.replace(damaged, repaired)
          script.write_text(source, encoding='utf-8')
          PY

          test -f python/rcp_rclm_runtime_v2/rcp_rclm_runtime/replay/reproduce.py
          test -f python/rcp_rclm_runtime_v2/tests_phase8/test_independent_replay.py
          test -f python/rcp_rclm_executable_core_v2/contract/phase_8_independent_replay.schema.json
          test -f .github/workflows/runtime-v2-phase-8.yml

          rm -f .phase8_payload.gz .phase8_payload.part* .phase8_payload.ready
          rm -f .github/workflows/apply-phase8-payload.yml
          rm -f .github/workflows/apply-phase8-valid-blob.yml
          rm -f .github/workflows/apply-phase8-with-python.yml
          rm -f .github/workflows/phase8-source-snapshot.yml
          rm -f .github/workflows/phase8-payload-artifact.yml
          git add -A
          git diff --cached --check

      - name: Validate recovered source before publication
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m compileall -q python/rcp_rclm_runtime_v2 scripts
          python python/rcp_rclm_runtime_v2/tools/validate_source_quality.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/phase8-source-quality.json
          python python/rcp_rclm_runtime_v2/tools/run_phase8_tests.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/phase8-tests.log

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement Phase 8 independent replay"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-phase-8-independent-replay
