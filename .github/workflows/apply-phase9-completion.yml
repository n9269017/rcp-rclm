name: Apply Phase 9 contract completion payload

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-9-contract
    paths:
      - ".phase9_completion/payload.b64"
      - ".github/workflows/apply-phase9-completion.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-phase9-contract-completion
  cancel-in-progress: false

jobs:
  apply:
    name: Apply and validate Phase 9 contract source
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out canonical Phase 9 branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v3-phase-9-contract
          fetch-depth: 0
          show-progress: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Decode and safely apply the Phase 9 source set
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import io
          import shutil
          import tarfile
          import tempfile
          from pathlib import Path, PurePosixPath

          repository = Path.cwd().resolve(strict=True)
          payload_path = repository / ".phase9_completion/payload.b64"
          encoded = payload_path.read_text(encoding="ascii").strip()
          if len(encoded) != 30196:
              raise RuntimeError(f"unexpected Phase 9 payload length: {len(encoded)}")
          encoded_hash = hashlib.sha256(encoded.encode("ascii")).hexdigest()
          if encoded_hash != "17fd7da0dd67ce85ff53a56064752dfcb524dd1ea586423248df5f4a982d1cbe":
              raise RuntimeError(f"Phase 9 encoded payload hash mismatch: {encoded_hash}")
          archive = base64.b64decode(encoded.encode("ascii"), validate=True)
          archive_hash = hashlib.sha256(archive).hexdigest()
          if archive_hash != "d06fdf541c99101b06a7e1d67650f93036e1fde826b3ee702d09fca60e05ef04":
              raise RuntimeError(f"Phase 9 archive hash mismatch: {archive_hash}")

          expected = {
              ".github/workflows/runtime-v3-phase-9.yml",
              "docs/executable_core_v3/PHASE_9_CONTRACT.md",
              "docs/executable_core_v3/PHASE_9_EXIT_CRITERIA.md",
              "docs/executable_core_v3/PHASE_9_HELDOUT_POLICY.md",
              "docs/executable_core_v3/PHASE_9_OBJECT_MAP.md",
              "docs/executable_core_v3/PHASE_9_VALIDATION.md",
              "docs/executable_core_v3/README.md",
              "docs/formal_core_v3/audit/Phase9ContractAxiomAudit.lean",
              "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned/ExecutableContract.lean",
              "python/rcp_rclm_executable_core_v3/contract/README.md",
              "python/rcp_rclm_executable_core_v3/contract/phase_9_contract.schema.json",
              "python/rcp_rclm_runtime_v3/README.md",
              "python/rcp_rclm_runtime_v3/phase_9_manifest.json",
              "python/rcp_rclm_runtime_v3/phase_9_validation.json",
              "python/rcp_rclm_runtime_v3/pyproject.toml",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/__init__.py",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/contract/__init__.py",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/contract/certificate.py",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/contract/records.py",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/contract/reference.py",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/contract/validation.py",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/py.typed",
              "python/rcp_rclm_runtime_v3/tests_phase9/test_contract.py",
              "python/rcp_rclm_runtime_v3/tools/run_phase9_reference.py",
              "python/rcp_rclm_runtime_v3/tools/run_phase9_tests.py",
              "python/rcp_rclm_runtime_v3/tools/validate_phase9_manifest.py",
              "python/rcp_rclm_runtime_v3/tools/validate_phase9_schema.py",
              "python/rcp_rclm_runtime_v3/tools/validate_source_quality.py",
              "scripts/run_phase9_contract.py",
          }

          with tempfile.TemporaryDirectory(prefix="rcp-rclm-phase9-payload-") as temporary:
              extraction = Path(temporary) / "extracted"
              extraction.mkdir()
              with tarfile.open(fileobj=io.BytesIO(archive), mode="r:gz") as bundle:
                  members = bundle.getmembers()
                  observed: set[str] = set()
                  for member in members:
                      normalized = member.name.removeprefix("./")
                      semantic = PurePosixPath(normalized)
                      if not normalized or semantic.is_absolute() or ".." in semantic.parts:
                          raise RuntimeError(f"unsafe Phase 9 archive path: {member.name}")
                      if member.issym() or member.islnk() or member.isdev():
                          raise RuntimeError(f"unsupported Phase 9 archive entry: {member.name}")
                      if member.isfile():
                          if normalized in observed:
                              raise RuntimeError(f"duplicate Phase 9 archive path: {normalized}")
                          observed.add(normalized)
                  if observed != expected:
                      missing = sorted(expected - observed)
                      unknown = sorted(observed - expected)
                      raise RuntimeError(
                          f"unexpected Phase 9 file set; missing={missing}, unknown={unknown}"
                      )
                  bundle.extractall(extraction)

              for relative in sorted(expected, key=lambda item: item.encode("utf-8")):
                  source = extraction.joinpath(*PurePosixPath(relative).parts)
                  if not source.is_file() or source.is_symlink():
                      raise RuntimeError(f"invalid extracted Phase 9 source: {relative}")
                  destination = repository.joinpath(*PurePosixPath(relative).parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copyfile(source, destination)

          print(f"applied Phase 9 files: {len(expected)}")
          PY

      - name: Remove temporary publication machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .phase9_completion
          rm -f .github/workflows/apply-phase9-completion.yml

      - name: Install Phase 9 dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Validate recovered Phase 9 source
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q python/rcp_rclm_runtime_v3 scripts/run_phase9_contract.py
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out /tmp/phase9-source-quality.json
          python python/rcp_rclm_runtime_v3/tools/run_phase9_tests.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out /tmp/phase9-tests.log
          python python/rcp_rclm_runtime_v3/tools/validate_phase9_schema.py \
            --schema python/rcp_rclm_executable_core_v3/contract/phase_9_contract.schema.json \
            --out /tmp/phase9-schema.json
          python python/rcp_rclm_runtime_v3/tools/run_phase9_reference.py \
            --out /tmp/phase9-reference.json
          python python/rcp_rclm_runtime_v3/tools/validate_phase9_manifest.py \
            --repo-root . \
            --out /tmp/phase9-manifest.json
          git diff --check

      - name: Commit the Phase 9 contract source atomically
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete Phase 9 learned-language-model contract source"
          git push origin HEAD:agent/rcp-rclm-v3-phase-9-contract
