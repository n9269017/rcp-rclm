name: Recover Phase 8 implementation payload

on:
  pull_request:
    branches:
      - main
    paths:
      - ".phase8-blob0.bin"
      - ".phase8-blob1.bin"
      - ".github/workflows/recover-phase8-payload.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out recovery branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Recover and validate implementation tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p recovered diagnostics
          cat .phase8-blob0.bin .phase8-blob1.bin > /tmp/phase8-payload.gz
          python - <<'PY'
          from __future__ import annotations

          import gzip
          import hashlib
          import io
          import json
          import tarfile
          from pathlib import Path, PurePosixPath

          part0 = Path('.phase8-blob0.bin').read_bytes()
          part1 = Path('.phase8-blob1.bin').read_bytes()
          compressed = Path('/tmp/phase8-payload.gz').read_bytes()
          diagnostics = {
              'part0_size': len(part0),
              'part0_sha256': hashlib.sha256(part0).hexdigest(),
              'part1_size': len(part1),
              'part1_sha256': hashlib.sha256(part1).hexdigest(),
              'combined_size': len(compressed),
              'combined_sha256': hashlib.sha256(compressed).hexdigest(),
              'gzip_magic': compressed[:2].hex(),
          }
          Path('diagnostics/payload.json').write_text(
              json.dumps(diagnostics, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )

          archive_bytes = gzip.decompress(compressed)
          diagnostics['archive_size'] = len(archive_bytes)
          diagnostics['archive_sha256'] = hashlib.sha256(archive_bytes).hexdigest()
          output_root = Path('recovered').resolve(strict=True)
          inventory: list[dict[str, object]] = []
          with tarfile.open(fileobj=io.BytesIO(archive_bytes), mode='r:') as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if names != sorted(names, key=lambda value: value.encode('utf-8')):
                  raise RuntimeError('payload members are not canonically ordered')
              if len(names) != len(set(names)):
                  raise RuntimeError('payload contains duplicate paths')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or not path.parts or '..' in path.parts:
                      raise RuntimeError(f'unsafe path: {member.name}')
                  if not member.isfile():
                      raise RuntimeError(f'non-regular member: {member.name}')
                  source = archive.extractfile(member)
                  if source is None:
                      raise RuntimeError(f'missing member content: {member.name}')
                  content = source.read()
                  destination = output_root.joinpath(*path.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(content)
                  inventory.append({
                      'path': member.name,
                      'sha256': hashlib.sha256(content).hexdigest(),
                      'size': len(content),
                  })
          diagnostics['member_count'] = len(inventory)
          required = (
              'python/rcp_rclm_runtime_v2/rcp_rclm_runtime/replay/reproduce.py',
              'python/rcp_rclm_runtime_v2/tests_phase8/test_independent_replay.py',
              'python/rcp_rclm_executable_core_v2/contract/phase_8_independent_replay.schema.json',
              '.github/workflows/runtime-v2-phase-8.yml',
          )
          missing = [name for name in required if not (output_root / name).is_file()]
          diagnostics['missing_required'] = missing
          Path('diagnostics/payload.json').write_text(
              json.dumps(diagnostics, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          if missing:
              raise RuntimeError(f'missing required files: {missing}')
          (output_root / 'RECOVERY_INVENTORY.json').write_text(
              json.dumps(inventory, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase8-recovery-diagnostics-${{ github.sha }}
          path: diagnostics/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload recovered implementation
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase8-recovered-implementation-${{ github.sha }}
          path: recovered/
          if-no-files-found: error
          retention-days: 7
