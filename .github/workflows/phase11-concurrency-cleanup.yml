name: Temporary Phase 11 concurrency cleanup

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-11-autonomous-generator
    paths:
      - ".github/workflows/phase11-concurrency-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase11-concurrency-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact cleanup head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Separate push and pull-request concurrency groups
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path(".github/workflows/runtime-v3-phase-11-generator.yml")
          text = path.read_text(encoding="utf-8")
          marker = "$" + "{{"
          old = (
              "  group: "
              + marker
              + " github.workflow }}-"
              + marker
              + " github.event.pull_request.head.ref || github.ref_name }}"
          )
          new = (
              "  group: "
              + marker
              + " github.workflow }}-"
              + marker
              + " github.event_name }}-"
              + marker
              + " github.event.pull_request.head.ref || github.ref_name }}"
          )
          if text.count(old) != 1:
              raise SystemExit("unexpected Phase 11 concurrency declaration")
          updated = text.replace(old, new)
          with path.open("w", encoding="utf-8", newline="\n") as stream:
              stream.write(updated)
          PY
          grep -F 'github.event_name' .github/workflows/runtime-v3-phase-11-generator.yml

      - name: Commit clean permanent workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/phase11-concurrency-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- .github/workflows/runtime-v3-phase-11-generator.yml
          git add -u -- .github/workflows/phase11-concurrency-cleanup.yml
          git diff --cached --check
          git commit -m "Separate Phase 11 push and pull-request concurrency"
          git push origin HEAD:agent/rcp-rclm-v3-phase-11-autonomous-generator
