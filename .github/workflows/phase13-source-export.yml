name: Export Phase 13 source snapshot

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase13-source-export.yml"
  push:
    branches:
      - agent/rcp-rclm-v3-phase-13-independent-replay
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase13-source-export-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/phase13-source
          tar \
            --exclude='.git' \
            --exclude='artifacts' \
            -czf artifacts/phase13-source/rcp-rclm-phase13-source.tar.gz .
          sha256sum artifacts/phase13-source/rcp-rclm-phase13-source.tar.gz \
            > artifacts/phase13-source/sha256.txt

      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b5b540449e92b4886f43607fa02
        with:
          name: phase13-source-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase13-source/
          if-no-files-found: error
          retention-days: 7
