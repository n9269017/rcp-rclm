name: Formal Core v2 Lean build

on:
  push:
    branches:
      - agent/rcp-rclm-formal-core-v2
    paths:
      - "lean/rcp_rclm_formal_core_v2/**"
      - "docs/formal_core_v2/**"
      - ".github/workflows/formal-core-v2.yml"
  pull_request:
    branches:
      - main
    paths:
      - "lean/rcp_rclm_formal_core_v2/**"
      - "docs/formal_core_v2/**"
      - ".github/workflows/formal-core-v2.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and audit pinned Formal Core v2 project
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify paper alignment pins and mapped theorem surfaces
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lean/rcp_rclm_formal_core_v2/audit-results
          bash docs/formal_core_v2/audit/verify_paper_alignment_pins.sh \
            2>&1 | tee \
            lean/rcp_rclm_formal_core_v2/audit-results/paper_alignment_pin_audit.txt

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Fetch official mathlib build cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -u
          mkdir -p audit-results

          set +e
          lake build > audit-results/lake_build.log 2>&1
          build_status=$?
          set -e

          if [ "$build_status" -ne 0 ]; then
            echo "Formal Core v2 build failed; showing the final 220 log lines."
            tail -n 220 audit-results/lake_build.log
            exit "$build_status"
          fi

          echo "Formal Core v2 build succeeded; showing the final 40 log lines."
          tail -n 40 audit-results/lake_build.log

      - name: Audit source for admitted proofs and local axioms
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results

          {
            echo "commit=${GITHUB_SHA}"
            echo "toolchain=$(cat lean-toolchain)"
            echo "lake_manifest_sha256=$(sha256sum lake-manifest.json | cut -d' ' -f1)"
            echo "paper_i_blob=$(git -C ../.. hash-object papers/paper-I-rcp-math/main.tex)"
            echo "paper_ii_blob=$(git -C ../.. hash-object papers/paper-II-rclm-architecture/main.tex)"
          } > audit-results/audit_metadata.txt

          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              '(^|[^[:alnum:]_])(sorry|admit)([^[:alnum:]_]|$)' \
              RcpRclmFormalCoreV2 RcpRclmFormalCoreV2.lean \
              > audit-results/forbidden_proof_tokens.txt; then
            cat audit-results/forbidden_proof_tokens.txt
            echo "Forbidden admitted proof token found in Formal Core v2 source." >&2
            exit 1
          fi

          : > audit-results/forbidden_proof_tokens.txt
          printf '%s\n' \
            'PASS: no sorry or admit token occurs in the Formal Core v2 Lean source.' \
            > audit-results/no_sorry_audit.txt

          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              '^[[:space:]]*axiom[[:space:]]' \
              RcpRclmFormalCoreV2 RcpRclmFormalCoreV2.lean \
              > audit-results/project_axiom_declarations.txt; then
            cat audit-results/project_axiom_declarations.txt
            echo "Project-local axiom declaration found in Formal Core v2 source." >&2
            exit 1
          fi

          : > audit-results/project_axiom_declarations.txt
          printf '%s\n' \
            'PASS: no project-local axiom declaration occurs in the Formal Core v2 Lean source.' \
            > audit-results/project_axiom_audit.txt

      - name: Print and validate Gate A theorem axioms
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results

          lake env lean \
            ../../docs/formal_core_v2/audit/GateAAxiomAudit.lean \
            2>&1 | tee audit-results/gate_a_axioms.txt

          if grep -Fq 'sorryAx' audit-results/gate_a_axioms.txt; then
            echo "sorryAx appears in the Gate A theorem axiom report." >&2
            exit 1
          fi

          printf '%s\n' \
            'PASS: all audited Gate A declarations elaborate and no report contains sorryAx.' \
            > audit-results/gate_a_axiom_audit_summary.txt

      - name: Print and validate Gate B theorem axioms
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results

          lake env lean \
            ../../docs/formal_core_v2/audit/GateBAxiomAudit.lean \
            2>&1 | tee audit-results/gate_b_axioms.txt

          if grep -Fq 'sorryAx' audit-results/gate_b_axioms.txt; then
            echo "sorryAx appears in the Gate B theorem axiom report." >&2
            exit 1
          fi

          printf '%s\n' \
            'PASS: all audited Gate B declarations elaborate and no report contains sorryAx.' \
            > audit-results/gate_b_axiom_audit_summary.txt

      - name: Upload Gate A and Gate B audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: formal-core-v2-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: lean/rcp_rclm_formal_core_v2/audit-results
          if-no-files-found: warn
          retention-days: 90
