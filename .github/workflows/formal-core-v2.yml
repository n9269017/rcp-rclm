name: Formal Core v2 Lean build

on:
  push:
    branches:
      - agent/rcp-rclm-formal-core-v2
    paths:
      - "lean/rcp_rclm_formal_core_v2/**"
      - ".github/workflows/formal-core-v2.yml"
  pull_request:
    branches:
      - main
    paths:
      - "lean/rcp_rclm_formal_core_v2/**"
      - ".github/workflows/formal-core-v2.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build pinned Formal Core v2 project
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Fetch official mathlib build cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake build
