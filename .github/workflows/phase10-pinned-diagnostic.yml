name: Phase 10 pinned verification diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase10-pinned-diagnostic.yml"
      - "python/rcp_rclm_runtime_v3/tools/run_phase10_closure.py"
      - "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase10/**"
  push:
    branches:
      - agent/rcp-rclm-v3-phase-10-substrate
    paths:
      - ".github/workflows/phase10-pinned-diagnostic.yml"
      - "python/rcp_rclm_runtime_v3/tools/run_phase10_closure.py"
      - "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase10/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase10-pinned-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Diagnose pinned Phase 10 verification
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Check out repository with formal history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify committed Lean manifest
        working-directory: lean/rcp_rclm_formal_core_v3
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake exe cache get

      - name: Build complete Formal Core v3
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake build

      - name: Run exact closure command
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase10_closure.py
          --repo-root .
          --lean-project-root lean/rcp_rclm_formal_core_v3
          --out artifacts/phase10_pinned_diagnostic/phase_10_closure.json

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase10-pinned-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase10_pinned_diagnostic/
          if-no-files-found: error
          retention-days: 7
