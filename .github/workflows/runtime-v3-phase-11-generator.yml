name: Runtime v3 Phase 11 autonomous typed experiment generator

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "docs/executable_core_v3/**"
      - "scripts/run_phase11_generator.py"
      - ".github/workflows/runtime-v3-phase-11-generator.yml"
  push:
    branches:
      - "agent/rcp-rclm-v3-phase-11-*"
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "docs/executable_core_v3/**"
      - "scripts/run_phase11_generator.py"
      - ".github/workflows/runtime-v3-phase-11-generator.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  portable:
    name: Validate Phase 11A generator (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile complete Phase 11A source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase11_generator.py

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/source_quality.json

      - name: Run retained Phase 9 regression
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase9_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/phase_9_tests.log

      - name: Run retained Phase 10 regression
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase10_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/phase_10_tests.log

      - name: Run focused Phase 11A tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase11_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/phase_11_tests.log

      - name: Validate Phase 11A Draft 2020-12 schema
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase11_schema.py
          --schema python/rcp_rclm_executable_core_v3/contract/phase_11_generator.schema.json
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/phase_11_schema.json

      - name: Recompute Phase 11A reference
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase11_reference.py
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/phase_11_reference.json

      - name: Run repository-root Phase 11A entry point
        run: >-
          python scripts/run_phase11_generator.py
          --out artifacts/runtime_v3_phase_11/${{ matrix.os }}/root_entry.json

      - name: Upload platform evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-11a-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_11/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Close Phase 11A typed-generator slice
    needs:
      - portable
    runs-on: ubuntu-latest

    steps:
      - name: Emit bounded Phase 11A closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v3_phase_11/final
          {
            echo "phase=11"
            echo "slice=11A"
            echo "commit=${GITHUB_SHA}"
            echo "cross_platform=success"
            echo "host_installed_active_generator_bootstrap=success"
            echo "active_model_generated_proposal=success"
            echo "model_generated_proposal_rejected=success"
            echo "fresh_model_generated_typed_program_validated=success"
            echo "manual_repairs=0"
            echo "heldout_material_consumed=false"
            echo "phase11a_slice_closed=true"
            echo "phase11_exit_closed=false"
          } > artifacts/runtime_v3_phase_11/final/closure.txt

      - name: Upload Phase 11A closure record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-11a-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_11/final/
          if-no-files-found: error
          retention-days: 90
