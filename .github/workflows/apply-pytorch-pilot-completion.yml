name: Apply PyTorch pilot completion payload

on:
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-pytorch-pilot
    paths:
      - ".pytorch_pilot_payload_v4/READY"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-pytorch-pilot-completion-v4
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out canonical pilot branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-pytorch-pilot
          fetch-depth: 0
          show-progress: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Decode and safely apply the complete overlay
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import io
          import shutil
          import tarfile
          import tempfile
          from pathlib import Path, PurePosixPath

          repository = Path.cwd().resolve(strict=True)
          payload_root = repository / ".pytorch_pilot_payload_v4"
          ready = payload_root / "READY"
          if not ready.is_file():
              raise RuntimeError("PyTorch pilot v4 payload readiness marker is absent")
          parts = sorted(payload_root.glob("part*.txt"))
          if len(parts) != 38:
              raise RuntimeError(f"expected 38 payload parts, observed {len(parts)}")
          encoded = "".join(part.read_text(encoding="ascii").strip() for part in parts)
          if len(encoded) != 75292:
              raise RuntimeError(f"unexpected encoded payload length: {len(encoded)}")
          encoded_hash = hashlib.sha256(encoded.encode("ascii")).hexdigest()
          if encoded_hash != "7426f596d240d380bb7b42dd09d234aebba97623f99228c77779437ce93adc0a":
              raise RuntimeError(f"encoded payload hash mismatch: {encoded_hash}")
          archive = base64.b64decode(encoded.encode("ascii"), validate=True)
          archive_hash = hashlib.sha256(archive).hexdigest()
          if archive_hash != "372fb0b8aae951505a1574cbbcf1128451d082e157af99225ebf5d1f4b2c1213":
              raise RuntimeError(f"archive hash mismatch: {archive_hash}")

          with tempfile.TemporaryDirectory(prefix="rcp-rclm-pytorch-payload-") as temp:
              extraction = Path(temp) / "extracted"
              extraction.mkdir()
              with tarfile.open(fileobj=io.BytesIO(archive), mode="r:gz") as bundle:
                  members = bundle.getmembers()
                  paths: list[str] = []
                  for member in members:
                      normalized = member.name.removeprefix("./")
                      path = PurePosixPath(normalized)
                      if not normalized or path.is_absolute() or ".." in path.parts:
                          raise RuntimeError(f"unsafe archive path: {member.name}")
                      if member.issym() or member.islnk() or member.isdev():
                          raise RuntimeError(f"unsupported archive entry: {member.name}")
                      if member.isfile():
                          paths.append(normalized)
                  if len(paths) != 26 or len(paths) != len(set(paths)):
                      raise RuntimeError(f"unexpected overlay file set: {len(paths)}")
                  bundle.extractall(extraction)
              for relative in sorted(paths, key=lambda item: item.encode("utf-8")):
                  semantic = PurePosixPath(relative)
                  source = extraction.joinpath(*semantic.parts)
                  if not source.is_file() or source.is_symlink():
                      raise RuntimeError(f"overlay source is not a regular file: {relative}")
                  destination = repository.joinpath(*semantic.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copyfile(source, destination)
              print("applied files:", len(paths))

          test_path = repository / "python/rcp_rclm_runtime_v2/tests_pytorch_pilot/test_admission_replay.py"
          source = test_path.read_text(encoding="utf-8")
          old = '''        self.assertTrue(verify_pytorch_pilot_promotion(self.accepted))\n        verified = load_active_phase7_store(\n            self.accepted.store_root, pytorch_pilot_phase7_policy()\n        )\n'''
          new = '''        verified = verify_pytorch_pilot_promotion(self.accepted)\n'''
          if old in source:
              test_path.write_text(source.replace(old, new, 1), encoding="utf-8")
          elif new not in source:
              raise RuntimeError("unexpected PyTorch promotion-verifier test shape")
          PY

      - name: Remove all temporary transfer machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            .pytorch_pilot_payload \
            .pytorch_pilot_payload_v2 \
            .pytorch_pilot_payload_v4 \
            .pytorch_pilot_completion
          rm -f \
            .github/workflows/apply-pytorch-pilot-completion.yml \
            .github/workflows/branch-tree-probe.yml

      - name: Validate recovered source before publication
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q python/rcp_rclm_runtime_v2 scripts
          python python/rcp_rclm_runtime_v2/tools/validate_source_quality.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/pytorch-pilot-source-quality.json
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check \
            --index-url https://download.pytorch.org/whl/cpu \
            torch==2.10.0
          python python/rcp_rclm_runtime_v2/tools/run_pytorch_pilot_tests.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/pytorch-pilot-tests.log

      - name: Commit the completed pilot source atomically
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete PyTorch pilot admission and independent replay"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-pytorch-pilot
