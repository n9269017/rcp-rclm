name: Apply PyTorch pilot completion payload

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-pytorch-pilot-completion.yml"
      - ".pytorch_pilot_payload/READY"
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-pytorch-pilot
    paths:
      - ".pytorch_pilot_payload/READY"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-pytorch-pilot-completion
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out canonical pilot branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-pytorch-pilot
          fetch-depth: 0
          show-progress: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Decode and safely apply the staged source payload
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee /tmp/pytorch-pilot-applicator.log
          from __future__ import annotations

          import base64
          import gzip
          import hashlib
          import io
          import shutil
          import tarfile
          import tempfile
          import zipfile
          from pathlib import Path, PurePosixPath

          repository = Path.cwd().resolve(strict=True)
          payload_root = repository / ".pytorch_pilot_payload"
          ready = payload_root / "READY"
          if not ready.is_file():
              raise RuntimeError("PyTorch pilot payload readiness marker is absent")
          parts = sorted(payload_root.glob("part*.txt"))
          if not parts:
              raise RuntimeError("no PyTorch pilot payload parts were staged")
          encoded = "".join(part.read_text(encoding="ascii").strip() for part in parts)
          archive = base64.b64decode(encoded.encode("ascii"), validate=True)
          print("encoded bytes:", len(encoded))
          print("encoded sha256:", hashlib.sha256(encoded.encode("ascii")).hexdigest())
          print("archive bytes:", len(archive))
          print("archive sha256:", hashlib.sha256(archive).hexdigest())
          print("archive magic:", archive[:8].hex())

          def safe_name(raw: str) -> str:
              normalized = raw.removeprefix("./")
              path = PurePosixPath(normalized)
              if not normalized or path.is_absolute() or ".." in path.parts:
                  raise RuntimeError(f"unsafe archive path: {raw}")
              return normalized

          def extract_payload(data: bytes, destination: Path) -> list[str]:
              candidates = [data]
              if data.startswith(b"\x1f\x8b"):
                  decompressed = gzip.decompress(data)
                  print("gzip payload bytes:", len(decompressed))
                  print("gzip payload magic:", decompressed[:8].hex())
                  candidates.insert(0, decompressed)
              errors: list[str] = []
              for candidate in candidates:
                  if zipfile.is_zipfile(io.BytesIO(candidate)):
                      paths: list[str] = []
                      with zipfile.ZipFile(io.BytesIO(candidate)) as bundle:
                          for info in bundle.infolist():
                              normalized = safe_name(info.filename)
                              mode = (info.external_attr >> 16) & 0xF000
                              if mode == 0xA000:
                                  raise RuntimeError(
                                      f"unsupported ZIP symlink: {info.filename}"
                                  )
                              if not info.is_dir():
                                  paths.append(normalized)
                          bundle.extractall(destination)
                      print("archive format: zip")
                      return paths
                  try:
                      paths = []
                      with tarfile.open(fileobj=io.BytesIO(candidate), mode="r:*") as bundle:
                          for member in bundle.getmembers():
                              normalized = safe_name(member.name)
                              if member.issym() or member.islnk() or member.isdev():
                                  raise RuntimeError(
                                      f"unsupported tar entry: {member.name}"
                                  )
                              if member.isfile():
                                  paths.append(normalized)
                          bundle.extractall(destination)
                      print("archive format: tar")
                      return paths
                  except tarfile.TarError as exc:
                      errors.append(f"{type(exc).__name__}: {exc}")
              raise RuntimeError(
                  "unsupported staged payload archive: " + " | ".join(errors)
              )

          with tempfile.TemporaryDirectory(prefix="rcp-rclm-pytorch-payload-") as temp:
              extraction = Path(temp) / "extracted"
              extraction.mkdir()
              extract_payload(archive, extraction)
              roots = [extraction]
              children = tuple(extraction.iterdir())
              if len(children) == 1 and children[0].is_dir():
                  roots.append(children[0])
                  nested = tuple(children[0].iterdir())
                  if len(nested) == 1 and nested[0].is_dir():
                      roots.append(nested[0])
              source_root = next(
                  (
                      root
                      for root in roots
                      if (root / "python/rcp_rclm_runtime_v2").is_dir()
                      and (root / "docs/executable_core_v2").is_dir()
                  ),
                  None,
              )
              if source_root is None:
                  raise RuntimeError(
                      "decoded payload does not contain the expected overlay root"
                  )
              print("source root:", source_root)
              manifest = source_root / "TRANSFER_MANIFEST.txt"
              if manifest.is_file():
                  paths = tuple(
                      line.strip()
                      for line in manifest.read_text(encoding="utf-8").splitlines()
                      if line.strip()
                  )
              else:
                  paths = tuple(
                      sorted(
                          (
                              path.relative_to(source_root).as_posix()
                              for path in source_root.rglob("*")
                              if path.is_file()
                              and not path.is_symlink()
                              and path.name != "TRANSFER_MANIFEST.txt"
                          ),
                          key=lambda item: item.encode("utf-8"),
                      )
                  )
              print("payload paths:", len(paths))
              if len(paths) < 20:
                  raise RuntimeError("payload file set is unexpectedly incomplete")
              if len(paths) != len(set(paths)):
                  raise RuntimeError("payload file set contains duplicate paths")
              for relative in paths:
                  semantic = PurePosixPath(relative)
                  if semantic.is_absolute() or ".." in semantic.parts:
                      raise RuntimeError(f"unsafe payload path: {relative}")
                  source = source_root.joinpath(*semantic.parts)
                  if not source.is_file() or source.is_symlink():
                      raise RuntimeError(f"payload source is not a regular file: {relative}")
                  destination = repository.joinpath(*semantic.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copyfile(source, destination)
              print("applied files:", len(paths))

          test_path = repository / "python/rcp_rclm_runtime_v2/tests_pytorch_pilot/test_admission_replay.py"
          source = test_path.read_text(encoding="utf-8")
          old = '''        self.assertTrue(verify_pytorch_pilot_promotion(self.accepted))\n        verified = load_active_phase7_store(\n            self.accepted.store_root, pytorch_pilot_phase7_policy()\n        )\n'''
          new = '''        verified = verify_pytorch_pilot_promotion(self.accepted)\n'''
          if old in source:
              test_path.write_text(source.replace(old, new, 1), encoding="utf-8")
          elif new not in source:
              raise RuntimeError("unexpected PyTorch promotion-verifier test shape")
          PY

      - name: Upload applicator diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytorch-pilot-applicator-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/pytorch-pilot-applicator.log
          if-no-files-found: error
          retention-days: 7

      - name: Remove all temporary transfer machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pytorch_pilot_payload .pytorch_pilot_completion
          rm -f .github/workflows/apply-pytorch-pilot-completion.yml

      - name: Validate recovered source before publication
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q python/rcp_rclm_runtime_v2 scripts
          python python/rcp_rclm_runtime_v2/tools/validate_source_quality.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/pytorch-pilot-source-quality.json
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check \
            --index-url https://download.pytorch.org/whl/cpu \
            torch==2.10.0
          python python/rcp_rclm_runtime_v2/tools/run_pytorch_pilot_tests.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/pytorch-pilot-tests.log

      - name: Commit the completed pilot source atomically
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete PyTorch pilot admission and independent replay"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-pytorch-pilot
