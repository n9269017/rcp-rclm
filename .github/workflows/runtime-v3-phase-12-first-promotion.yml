name: Runtime v3 Phase 12 first self-hosted promotion

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "lean/rcp_rclm_formal_core_v2/**"
      - "lean/rcp_rclm_formal_core_v3/**"
      - "docs/executable_core_v3/**"
      - "docs/formal_core_v3/audit/Phase10InformationAxiomAudit.lean"
      - "scripts/run_phase12_first_promotion.py"
      - ".github/workflows/runtime-v3-phase-12-first-promotion.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  portable:
    name: Validate Phase 12B first promotion (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile complete Phase 12B source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase12_recursion.py
          scripts/run_phase12_first_promotion.py

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12b/${{ matrix.os }}/source_quality.json

      - name: Validate retained Phase 11 closure dependency
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase11_closure_manifest.py
          --repo-root .
          --no-recompute
          --out artifacts/runtime_v3_phase_12b/${{ matrix.os }}/phase_11_closure_manifest.json

      - name: Run focused Phase 12 tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12b/${{ matrix.os }}/phase_12_tests.log

      - name: Recompute Phase 12B first-promotion reference
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12b_reference.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12b/${{ matrix.os }}/phase_12b_reference.json

      - name: Validate Phase 12B Draft 2020-12 schema
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase12b_schema.py
          --schema python/rcp_rclm_executable_core_v3/contract/phase_12_first_promotion.schema.json
          --instance artifacts/runtime_v3_phase_12b/${{ matrix.os }}/phase_12b_reference.json
          --out artifacts/runtime_v3_phase_12b/${{ matrix.os }}/phase_12b_schema.json

      - name: Run repository Phase 12B entry point
        run: >-
          python scripts/run_phase12_first_promotion.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12b/${{ matrix.os }}/phase_12b_root_entry.json

      - name: Require byte-identical Phase 12B entry points
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("artifacts/runtime_v3_phase_12b/${{ matrix.os }}")
          assert (root / "phase_12b_reference.json").read_bytes() == (
              root / "phase_12b_root_entry.json"
          ).read_bytes()
          PY

      - name: Upload portable Phase 12B evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12b-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12b/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  untrusted-training:
    name: Validate isolated Phase 12B training
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned untrusted backend
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test,phase10-train]"

      - name: Execute duplicate generation-1 worker runs
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12b_training_reference.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12b/training/phase_12b_training.json

      - name: Verify fixed training and isolation record
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("artifacts/runtime_v3_phase_12b/training/phase_12b_training.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          assert report["accepted"] is True
          assert report["worker_training_invocations"] == 2
          assert report["heldout_task_ids_consumed"] is False
          assert report["heldout_prompts_consumed"] is False
          assert report["heldout_source_consumed"] is False
          assert report["heldout_reference_answers_consumed"] is False
          assert report["candidate_self_report_authoritative"] is False
          PY

      - name: Upload untrusted Phase 12B training evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12b-training-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12b/training/
          if-no-files-found: error
          retention-days: 90

  pinned-closure:
    name: Reject first attempt and promote M1 with pinned Lean
    needs:
      - portable
      - untrusted-training
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository with formal history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes without training backend
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve frozen Formal Core v2 dependencies
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify frozen Formal Core v2 manifest
        working-directory: lean/rcp_rclm_formal_core_v2
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official v2 mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build frozen Formal Core v2 bridge
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../rcp_rclm_formal_core_v3/audit-results-phase12b-closure
          lake build 2>&1 | tee ../rcp_rclm_formal_core_v3/audit-results-phase12b-closure/formal_core_v2_build.log

      - name: Resolve pinned Formal Core v3 dependency graph
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify committed Formal Core v3 manifest
        working-directory: lean/rcp_rclm_formal_core_v3
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official v3 mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake exe cache get

      - name: Build complete Formal Core v3
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -o pipefail
          mkdir -p audit-results-phase12b-closure
          lake build 2>&1 | tee audit-results-phase12b-closure/lake_build.log

      - name: Reject admitted proofs and local axioms
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              --exclude-dir='audit-results-phase9' \
              --exclude-dir='audit-results-phase10' \
              --exclude-dir='audit-results-phase10b' \
              --exclude-dir='audit-results-phase10-closure' \
              --exclude-dir='audit-results-phase11-closure' \
              --exclude-dir='audit-results-phase12b-closure' \
              '(^|[^[:alnum:]_])(sorryAx|sorry|admit)([^[:alnum:]_]|$)' \
              RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean \
              > audit-results-phase12b-closure/forbidden_proof_tokens.txt; then
            cat audit-results-phase12b-closure/forbidden_proof_tokens.txt
            exit 1
          fi
          : > audit-results-phase12b-closure/forbidden_proof_tokens.txt
          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              --exclude-dir='audit-results-phase9' \
              --exclude-dir='audit-results-phase10' \
              --exclude-dir='audit-results-phase10b' \
              --exclude-dir='audit-results-phase10-closure' \
              --exclude-dir='audit-results-phase11-closure' \
              --exclude-dir='audit-results-phase12b-closure' \
              '^[[:space:]]*axiom[[:space:]]' \
              RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean \
              > audit-results-phase12b-closure/project_axiom_declarations.txt; then
            cat audit-results-phase12b-closure/project_axiom_declarations.txt
            exit 1
          fi
          : > audit-results-phase12b-closure/project_axiom_declarations.txt

      - name: Audit inherited selected information theorems
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          lake env lean ../../docs/formal_core_v3/audit/Phase10InformationAxiomAudit.lean \
            2>&1 | tee audit-results-phase12b-closure/phase_10_information_axioms.txt
          if grep -Fq 'sorryAx' audit-results-phase12b-closure/phase_10_information_axioms.txt; then
            exit 1
          fi

      - name: Execute authoritative Phase 12B rejection and promotion
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/runtime_v3_phase_12b/pinned
          python python/rcp_rclm_runtime_v3/tools/run_phase12b_closure.py \
            --repo-root . \
            --lean-project-root lean/rcp_rclm_formal_core_v3 \
            --out artifacts/runtime_v3_phase_12b/pinned/phase_12b_closure.json \
            2>&1 | tee artifacts/runtime_v3_phase_12b/pinned/phase_12b_closure_stdout.log

      - name: Verify first promotion, frontier growth, and ledger
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from rcp_rclm_runtime.canonical.hashing import canonical_json_hash

          path = Path("artifacts/runtime_v3_phase_12b/pinned/phase_12b_closure.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          declared = report["report_hash"]
          content = dict(report)
          content.pop("report_hash")
          assert declared == canonical_json_hash(content)
          assert report["accepted"] is True
          assert report["phase12b_first_promotion_closed"] is True
          assert report["phase12_exit_closed"] is False
          assert report["first_phase12_atomic_promotion"] is True
          assert report["frontier_cardinality_before"] == 3
          assert report["frontier_cardinality_after"] == 4
          assert report["accepted_phase12_promotions"] == 1
          assert report["rejected_phase12_attempts"] == 1
          assert report["manual_repairs"] == 0
          assert report["heldout_material_consumed"] is False
          promotion = report["promotion_hash"]
          assert isinstance(promotion, str) and len(promotion) == 64
          PY

      - name: Retain pinned Phase 12B evidence
        shell: bash
        run: |
          set -euo pipefail
          cp lean/rcp_rclm_formal_core_v3/audit-results-phase12b-closure/* \
            artifacts/runtime_v3_phase_12b/pinned/
          cp lean/rcp_rclm_formal_core_v2/lake-manifest.json \
            artifacts/runtime_v3_phase_12b/pinned/formal-core-v2-lake-manifest.json
          cp lean/rcp_rclm_formal_core_v3/lake-manifest.json \
            artifacts/runtime_v3_phase_12b/pinned/formal-core-v3-lake-manifest.json
          {
            echo "commit=${GITHUB_SHA}"
            echo "toolchain=$(cat lean/rcp_rclm_formal_core_v3/lean-toolchain)"
            echo "formal_v2_tree=$(git rev-parse HEAD:lean/rcp_rclm_formal_core_v2)"
            echo "formal_v3_tree=$(git rev-parse HEAD:lean/rcp_rclm_formal_core_v3)"
            echo "runtime_tree=$(git rev-parse HEAD:python/rcp_rclm_runtime_v3)"
            echo "accepted_phase12_promotions=1"
            echo "rejected_phase12_attempts=1"
            echo "manual_repairs=0"
            echo "heldout_material_consumed=false"
          } > artifacts/runtime_v3_phase_12b/pinned/metadata.txt

      - name: Upload pinned Phase 12B closure evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12b-pinned-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12b/pinned/
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Close Phase 12B first-promotion slice
    needs:
      - portable
      - untrusted-training
      - pinned-closure
    runs-on: ubuntu-latest

    steps:
      - name: Emit Phase 12B closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v3_phase_12b/final
          {
            echo "phase=12"
            echo "slice=12B"
            echo "commit=${GITHUB_SHA}"
            echo "cross_platform=success"
            echo "recursive_generation2_proposal=success"
            echo "first_rejection_retained=success"
            echo "first_phase12_candidate_realized=success"
            echo "first_phase12_frontier_expansion=success"
            echo "first_phase12_atomic_promotion=success"
            echo "accepted_phase12_promotions=1"
            echo "rejected_phase12_attempts=1"
            echo "frontier_cardinality=4"
            echo "heldout_material_consumed=false"
            echo "manual_repairs=0"
            echo "phase12b_first_promotion_closed=true"
            echo "phase12_exit_closed=false"
          } > artifacts/runtime_v3_phase_12b/final/closure.txt

      - name: Upload final Phase 12B closure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12b-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12b/final/
          if-no-files-found: error
          retention-days: 90
