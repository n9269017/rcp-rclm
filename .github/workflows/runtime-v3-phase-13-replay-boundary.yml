name: Runtime v3 Phase 13 independent replay boundary

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-v3-phase-13-replay-boundary.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase13-source-snapshot-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  materialize-complete-source:
    name: Materialize validated complete Phase 13 source
    if: ${{ github.event_name == 'pull_request' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact pull-request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Verify and extract deterministic payload
        shell: bash
        run: |
          set -euo pipefail
          cat .phase13_complete_payload/part* > /tmp/phase13-complete-payload.b64
          base64 --decode /tmp/phase13-complete-payload.b64 > /tmp/phase13-complete-payload.tar.gz
          echo "170f8ca3cf82e69fc0bafc4d6064c08f84c8fd53c930eecaae7371f3af18224b  /tmp/phase13-complete-payload.tar.gz" | sha256sum --check --strict
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import tarfile

          archive = Path('/tmp/phase13-complete-payload.tar.gz')
          expected = 25
          with tarfile.open(archive, 'r:gz') as handle:
              members = handle.getmembers()
              if len(members) != expected:
                  raise SystemExit(f'unexpected payload entry count: {len(members)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe payload path: {member.name}')
                  if not member.isfile():
                      raise SystemExit(f'non-regular payload entry: {member.name}')
          PY
          tar -xzf /tmp/phase13-complete-payload.tar.gz -C .
          rm -rf .phase13_complete_payload
          rm -f .github/workflows/runtime-v3-phase-13-complete.yml
          printf '%s\n' 'phase13-complete-source-materialized' > .phase13_complete_materialized
      - name: Install deterministic test runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"
      - name: Compile complete Phase 13 source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts
      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out /tmp/phase13-source-quality.json
      - name: Run focused Phase 13 tests
        run: >-
          python -m unittest discover
          -s python/rcp_rclm_runtime_v3/tests_phase13
          -p 'test_*.py'
          -v
      - name: Reject whitespace errors
        run: git diff --check
      - name: Commit validated complete Phase 13 source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Materialize validated Phase 13 implementation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  source-snapshot:
    name: Export current Phase 13 source tree
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Archive source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/phase13-source
          tar --exclude='.git' --exclude='artifacts' -czf artifacts/phase13-source/phase13-current-source.tar.gz .
          sha256sum artifacts/phase13-source/phase13-current-source.tar.gz > artifacts/phase13-source/sha256.txt
      - name: Upload source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase13-current-source-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase13-source/
          if-no-files-found: error
          retention-days: 7
