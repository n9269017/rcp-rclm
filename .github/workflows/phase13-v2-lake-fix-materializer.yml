name: Materialize Runtime v2 native Elan compiler repair

on:
  push:
    branches:
      - agent/phase13-pinned-portability-fix-materializer
    paths:
      - ".phase13_v2_lake_fix/**"
      - ".github/workflows/phase13-v2-lake-fix-materializer.yml"

permissions:
  contents: write

concurrency:
  group: phase13-v2-lake-fix-materializer
  cancel-in-progress: false

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out staged repair
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify and extract deterministic repair
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .phase13_v2_lake_fix/payload.b64 > /tmp/phase13-v2-lake-fix.tar.gz
          echo "8e6b689b6f0a8bcee880280bb001ba13f3518df5cbfdc9d3877fa870ec65675b  /tmp/phase13-v2-lake-fix.tar.gz" | sha256sum --check --strict
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import tarfile

          archive = Path('/tmp/phase13-v2-lake-fix.tar.gz')
          expected = (
              'python/rcp_rclm_runtime_v2/rcp_rclm_runtime/lean_bridge/compiler.py',
              'python/rcp_rclm_runtime_v2/tests_phase2/test_compiler.py',
          )
          with tarfile.open(archive, 'r:gz') as handle:
              members = handle.getmembers()
              observed = tuple(member.name for member in members)
              if observed != expected:
                  raise SystemExit(f'unexpected repair entries: {observed!r}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe repair path: {member.name}')
                  if not member.isfile():
                      raise SystemExit(f'non-regular repair entry: {member.name}')
          PY
          tar -xzf /tmp/phase13-v2-lake-fix.tar.gz -C .
          rm -rf .phase13_v2_lake_fix
          rm -f .github/workflows/phase13-v2-lake-fix-materializer.yml

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile repaired source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v2
          python/rcp_rclm_runtime_v3

      - name: Validate Runtime v2 source quality
        run: >-
          python python/rcp_rclm_runtime_v2/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v2
          --out /tmp/phase13-v2-lake-source-quality-v2.json

      - name: Validate Runtime v3 source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out /tmp/phase13-v2-lake-source-quality-v3.json

      - name: Run complete Phase 2 bridge tests
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase2_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out /tmp/phase13-v2-lake-phase2-tests.log

      - name: Run focused Phase 13 tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase13_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out /tmp/phase13-v2-lake-phase13-tests.log

      - name: Verify exact repair surface
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          compiler = Path('python/rcp_rclm_runtime_v2/rcp_rclm_runtime/lean_bridge/compiler.py').read_text(encoding='utf-8')
          tests = Path('python/rcp_rclm_runtime_v2/tests_phase2/test_compiler.py').read_text(encoding='utf-8')
          required = (
              'ELAN_HOME_INVALID',
              'native Elan home',
              'shutil.which("lake", path=environment.get("PATH"))',
              'elan_home / "bin" / "lake.exe"',
          )
          for token in required:
              if token not in compiler:
                  raise SystemExit(f'missing compiler repair token: {token}')
          for token in (
              'test_native_elan_launcher_is_used_when_path_lookup_fails',
              'test_relative_elan_home_is_rejected',
              'test_missing_path_and_native_elan_launcher_fail_closed',
          ):
              if token not in tests:
                  raise SystemExit(f'missing compiler regression test: {token}')
          PY
          git diff --check

      - name: Commit validated repair on staging branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/rcp-rclm-v3-phase-13-independent-replay
          test "$(git rev-parse FETCH_HEAD)" = "6f4d91f4a9f767d71eec5e4a5f2b5a295a312f1f"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix Runtime v2 native Elan Lake discovery"
          echo "PHASE13_V2_LAKE_FINAL_TREE=$(git rev-parse 'HEAD^{tree}')"
          git push origin HEAD:agent/phase13-pinned-portability-fix-materializer
