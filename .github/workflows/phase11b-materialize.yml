name: Temporary Phase 11B source materializer

on:
  pull_request:
    branches:
      - main
    paths:
      - ".phase11b_source_parts/**"
      - ".github/workflows/phase11b-materialize.yml"
  push:
    branches:
      - agent/rcp-rclm-v3-phase-11-autonomous-generator
    paths:
      - ".phase11b_source_parts/**"
      - ".github/workflows/phase11b-materialize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase11b-materialize-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Materialize transparent source parts
        shell: bash
        run: |
          set -euo pipefail
          cat .phase11b_source_parts/lifecycle-*.part > \
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/phase11b_lifecycle.py
          cat .phase11b_source_parts/closure-*.part > \
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/phase11b_closure.py
          git apply --check .phase11b_source_parts/candidate.patch
          git apply .phase11b_source_parts/candidate.patch

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile materialized source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase11_lifecycle.py

      - name: Validate materialized source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/phase11b_materializer/source_quality.json

      - name: Run retained and Phase 11 tests
        shell: bash
        run: |
          python python/rcp_rclm_runtime_v3/tools/run_phase9_tests.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out artifacts/phase11b_materializer/phase9.log
          python python/rcp_rclm_runtime_v3/tools/run_phase10_tests.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out artifacts/phase11b_materializer/phase10.log
          python python/rcp_rclm_runtime_v3/tools/run_phase11_tests.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out artifacts/phase11b_materializer/phase11.log

      - name: Validate portable Phase 11B schema and reference
        shell: bash
        run: |
          python python/rcp_rclm_runtime_v3/tools/validate_phase11b_schema.py \
            --schema python/rcp_rclm_executable_core_v3/contract/phase_11_lifecycle.schema.json \
            --out artifacts/phase11b_materializer/schema.json
          python python/rcp_rclm_runtime_v3/tools/run_phase11b_reference.py \
            --out artifacts/phase11b_materializer/reference.json
          python scripts/run_phase11_lifecycle.py \
            --out artifacts/phase11b_materializer/root_entry.json

      - name: Commit materialized runtime
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/phase11b_candidate.py \
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/phase11b_lifecycle.py \
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/phase11b_closure.py
          if git diff --cached --quiet; then
            echo "Phase 11B runtime already materialized"
            exit 0
          fi
          git commit -m "Implement Phase 11 model-generated rejection and promotion lifecycle"
          git push origin HEAD:agent/rcp-rclm-v3-phase-11-autonomous-generator

      - name: Upload materialization evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase11b-materialization-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase11b_materializer/
          if-no-files-found: error
          retention-days: 7
