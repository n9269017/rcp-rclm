name: Export merged Phase 12E retained artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase13-phase12e-artifact-export.yml"
  push:
    branches:
      - agent/rcp-rclm-v3-phase-13-independent-replay
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: merged-phase12e-retained-artifact-${{ github.run_id }}
          path: artifacts/phase12e-source/
          if-no-files-found: error
          retention-days: 2
