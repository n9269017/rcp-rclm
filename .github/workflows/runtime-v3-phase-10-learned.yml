name: Runtime v3 Phase 10 learned compact-model execution

on:
  push:
    branches:
      - "agent/rcp-rclm-v3-phase-10-*"
    paths:
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned.lean"
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned/Phase10Information.lean"
      - ".github/workflows/runtime-v3-phase-10-learned.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pinned-lean-diagnostic:
    name: Capture exact Phase 10B pinned Lean failure
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify committed dependency manifest
        working-directory: lean/rcp_rclm_formal_core_v3
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake exe cache get

      - name: Build and retain exact diagnostics
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set +e
          lake build > phase10_pinned_build.log 2>&1
          status=$?
          cat phase10_pinned_build.log
          printf '%s\n' "$status" > phase10_pinned_build.status
          exit "$status"

      - name: Upload exact pinned build log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase10-pinned-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            lean/rcp_rclm_formal_core_v3/phase10_pinned_build.log
            lean/rcp_rclm_formal_core_v3/phase10_pinned_build.status
          if-no-files-found: error
          retention-days: 7
