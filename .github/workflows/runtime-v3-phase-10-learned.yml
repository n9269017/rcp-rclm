name: Runtime v3 Phase 10 learned compact-model execution

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned.lean"
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned/Phase10Information.lean"
      - "docs/executable_core_v3/**"
      - "docs/formal_core_v3/audit/Phase10InformationAxiomAudit.lean"
      - "scripts/run_phase10_learned.py"
      - ".github/workflows/runtime-v3-phase-10-learned.yml"
  push:
    branches:
      - "agent/rcp-rclm-v3-phase-10-*"
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned.lean"
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned/Phase10Information.lean"
      - "docs/executable_core_v3/**"
      - "docs/formal_core_v3/audit/Phase10InformationAxiomAudit.lean"
      - "scripts/run_phase10_learned.py"
      - ".github/workflows/runtime-v3-phase-10-learned.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  learned-contract:
    name: Validate Phase 10B learned contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Runtime v2 and Runtime v3
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile Phase 9 and Phase 10 source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase9_contract.py
          scripts/run_phase10_substrate.py
          scripts/run_phase10_learned.py

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/source_quality.json

      - name: Re-run Phase 9 contract tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase9_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/phase_9_tests.log

      - name: Run complete Phase 10 focused tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase10_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/phase_10_tests.log

      - name: Validate Phase 10B Draft 2020-12 schema
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase10_learned_schema.py
          --schema python/rcp_rclm_executable_core_v3/contract/phase_10_learned.schema.json
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/schema_validation.json

      - name: Recompute learned compact-model reference
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase10_learned_reference.py
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/learned_reference.json

      - name: Validate Phase 10B manifest and exact hashes
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase10_learned_manifest.py
          --repo-root .
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/manifest_validation.json

      - name: Run repository-root Phase 10B entry point
        run: >-
          python scripts/run_phase10_learned.py
          --out artifacts/runtime_v3_phase_10b/${{ matrix.os }}/entry_point.json

      - name: Upload platform evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-10b-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_10b/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  untrusted-training:
    name: Validate isolated Phase 10B PyTorch training worker
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Runtime v2, Runtime v3, and pinned untrusted training backend
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test,phase10-train]"

      - name: Run two fresh bootstrap and successor training invocations
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase10_training_reference.py
          --out artifacts/runtime_v3_phase_10b/training/training_reference.json

      - name: Upload untrusted-worker evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-10b-training-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_10b/training/
          if-no-files-found: error
          retention-days: 90

  pinned-lean:
    name: Validate Phase 10B tasks and information bridge with pinned Lean
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository with formal history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Runtime v2 and Runtime v3
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Install pinned Lean toolchain through Formal Core v3
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify committed dependency manifest remains exact
        working-directory: lean/rcp_rclm_formal_core_v3
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official mathlib build cache
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake exe cache get

      - name: Build Formal Core v3 with Phase 10B information bridge
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results-phase10b
          lake build > audit-results-phase10b/lake_build.log 2>&1
          tail -n 60 audit-results-phase10b/lake_build.log

      - name: Reject forbidden proof tokens and local axioms
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              --exclude-dir='audit-results-phase9' \
              --exclude-dir='audit-results-phase10' \
              --exclude-dir='audit-results-phase10b' \
              '(^|[^[:alnum:]_])(sorryAx|sorry|admit)([^[:alnum:]_]|$)' \
              RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean \
              > audit-results-phase10b/forbidden_proof_tokens.txt; then
            cat audit-results-phase10b/forbidden_proof_tokens.txt
            exit 1
          fi
          : > audit-results-phase10b/forbidden_proof_tokens.txt
          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              --exclude-dir='audit-results-phase9' \
              --exclude-dir='audit-results-phase10' \
              --exclude-dir='audit-results-phase10b' \
              '^[[:space:]]*axiom[[:space:]]' \
              RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean \
              > audit-results-phase10b/project_axiom_declarations.txt; then
            cat audit-results-phase10b/project_axiom_declarations.txt
            exit 1
          fi
          : > audit-results-phase10b/project_axiom_declarations.txt

      - name: Audit Phase 10B selected information theorems
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          lake env lean ../../docs/formal_core_v3/audit/Phase10InformationAxiomAudit.lean \
            2>&1 | tee audit-results-phase10b/phase_10b_axioms.txt
          if grep -Fq 'sorryAx' audit-results-phase10b/phase_10b_axioms.txt; then
            echo "sorryAx appears in the Phase 10B axiom report." >&2
            exit 1
          fi

      - name: Execute protected and held-out completions with pinned Lean
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase10_lean_tasks.py
          --lean-project-root lean/rcp_rclm_formal_core_v3
          --out artifacts/runtime_v3_phase_10b/pinned/lean_tasks.json

      - name: Recompute learned reference and manifest under pinned environment
        run: |
          python python/rcp_rclm_runtime_v3/tools/run_phase10_learned_reference.py \
            --out artifacts/runtime_v3_phase_10b/pinned/learned_reference.json
          python python/rcp_rclm_runtime_v3/tools/validate_phase10_learned_manifest.py \
            --repo-root . \
            --out artifacts/runtime_v3_phase_10b/pinned/manifest_validation.json

      - name: Retain pinned evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v3_phase_10b/pinned
          cp lean/rcp_rclm_formal_core_v3/audit-results-phase10b/* \
            artifacts/runtime_v3_phase_10b/pinned/
          cp lean/rcp_rclm_formal_core_v3/lake-manifest.json \
            artifacts/runtime_v3_phase_10b/pinned/lake-manifest.json
          cp python/rcp_rclm_runtime_v3/phase_10_learned_manifest.json \
            artifacts/runtime_v3_phase_10b/pinned/phase_10_learned_manifest.json
          {
            echo "commit=${GITHUB_SHA}"
            echo "toolchain=$(cat lean/rcp_rclm_formal_core_v3/lean-toolchain)"
            echo "formal_tree=$(git rev-parse HEAD:lean/rcp_rclm_formal_core_v3)"
            echo "runtime_tree=$(git rev-parse HEAD:python/rcp_rclm_runtime_v3)"
          } > artifacts/runtime_v3_phase_10b/pinned/metadata.txt

      - name: Upload pinned Phase 10B evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-10b-pinned-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_10b/pinned/
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Verify Phase 10B workflow closure
    runs-on: ubuntu-latest
    needs:
      - learned-contract
      - untrusted-training
      - pinned-lean
    steps:
      - name: Emit closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v3_phase_10b/final
          {
            echo "phase=10B"
            echo "commit=${GITHUB_SHA}"
            echo "cross_platform=success"
            echo "untrusted_training=success"
            echo "pinned_lean_tasks=success"
            echo "phase9_gate_d_transition=success"
            echo "claim=learned_execution_and_frontier_expansion"
            echo "phase10_exit_closed=false"
          } > artifacts/runtime_v3_phase_10b/final/closure.txt

      - name: Upload closure record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-10b-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_10b/final/
          if-no-files-found: error
          retention-days: 90
