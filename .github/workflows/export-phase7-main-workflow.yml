name: Export canonical Phase 7 workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-phase7-main-workflow.yml"
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-phase-8-independent-replay
    paths:
      - ".github/workflows/export-phase7-main-workflow.yml"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out canonical Phase 8 branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-phase-8-independent-replay
          fetch-depth: 0
          show-progress: false

      - name: Commit a temporary text copy of the main Phase 7 workflow
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/runtime-v2-phase-7.yml > phase7-workflow-main.txt
          git add phase7-workflow-main.txt
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Export canonical Phase 7 workflow text"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-phase-8-independent-replay
