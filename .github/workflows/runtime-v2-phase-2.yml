name: Runtime v2 Phase 2 Lean conformance bridge

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "lean/rcp_rclm_formal_core_v2/**"
      - "docs/executable_core_v2/**"
      - ".github/workflows/runtime-v2-phase-2.yml"
  push:
    branches:
      - "agent/rcp-rclm-runtime-v2-phase-2-lean-bridge"
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "lean/rcp_rclm_formal_core_v2/**"
      - "docs/executable_core_v2/**"
      - ".github/workflows/runtime-v2-phase-2.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-unit:
    name: Validate bridge Python layer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check -e python/rcp_rclm_runtime_v2

      - name: Compile Python source
        run: python -m compileall -q python/rcp_rclm_runtime_v2

      - name: Validate source quality
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_2/${{ matrix.os }}/source_quality.json

      - name: Run Phase 1 regression suite
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/run_phase1_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_2/${{ matrix.os }}/phase_1_regression.log

      - name: Run Phase 2 bridge unit suite
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/run_phase2_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_2/${{ matrix.os }}/phase_2_unit.log

      - name: Upload Python validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-v2-phase-2-python-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_2/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  lean-conformance:
    name: Run pinned Lean reference conformance
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check -e python/rcp_rclm_runtime_v2

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Fetch official mathlib build cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build pinned Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results
          lake build > audit-results/phase_2_lake_build.log 2>&1
          tail -n 40 audit-results/phase_2_lake_build.log

      - name: Run generated-source differential conformance
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/run_phase2_conformance.py
          --repo-root .
          --outdir artifacts/runtime_v2_phase_2/lean_conformance
          --timeout-seconds 180

      - name: Verify generated source contains no admissions or local axioms
        shell: bash
        run: |
          set -euo pipefail
          generated_root=artifacts/runtime_v2_phase_2/lean_conformance
          if grep -RInE \
              --include='*.lean' \
              '(^|[^[:alnum:]_])(sorryAx|sorry|admit)([^[:alnum:]_]|$)' \
              "$generated_root"; then
            echo "Generated Phase 2 source contains an admitted-proof token." >&2
            exit 1
          fi
          if grep -RInE \
              --include='*.lean' \
              '^[[:space:]]*(private[[:space:]]+)?axiom[[:space:]]+' \
              "$generated_root"; then
            echo "Generated Phase 2 source contains a project-local axiom declaration." >&2
            exit 1
          fi

      - name: Upload Lean conformance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-v2-phase-2-lean-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/runtime_v2_phase_2/lean_conformance/
            lean/rcp_rclm_formal_core_v2/audit-results/phase_2_lake_build.log
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Verify Phase 2 job closure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - python-unit
      - lean-conformance

    steps:
      - name: Emit final workflow closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v2_phase_2/final
          cat > artifacts/runtime_v2_phase_2/final/workflow_closure.json <<JSON
          {
            "schema_id": "runtime.phase_2_workflow_closure.v2",
            "head_sha": "${GITHUB_SHA}",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}",
            "python_platform_count": 3,
            "lean_reference_case_count": 10,
            "ok": true
          }
          JSON

      - name: Upload final Phase 2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-v2-phase-2-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_2/final/
          if-no-files-found: error
          retention-days: 90
