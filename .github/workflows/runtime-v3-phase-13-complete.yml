name: Runtime v3 Phase 13 independent replay and adversarial closure

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-v3-phase-13-complete.yml"
      - "docs/executable_core_v3/PHASE_13*.md"
      - "python/rcp_rclm_executable_core_v3/contract/phase_13_complete_replay.schema.json"
      - "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase13/**"
      - "python/rcp_rclm_runtime_v3/tests_phase13/**"
      - "python/rcp_rclm_runtime_v3/tools/*phase13*"
      - "python/rcp_rclm_runtime_v3/tools/run_phase12e_closure.py"
      - "scripts/*phase13*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PHASE13_SOURCE_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

concurrency:
  group: phase13-complete-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture exact closed Phase 12 trajectory
    runs-on: ubuntu-latest
    timeout-minutes: 600
    steps:
      - name: Check out exact replay source head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ env.PHASE13_SOURCE_HEAD }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes without learned workers
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile Phase 13 and closure entry points
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase13_structural_replay.py
          scripts/run_phase13_pinned_replay.py
          scripts/close_phase13.py

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_13/capture/source_quality.json

      - name: Run focused Phase 13 tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase13_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_13/capture/phase13_tests.log

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve and build frozen Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        shell: bash
        run: |
          set -euo pipefail
          lake update
          git diff --exit-code -- lake-manifest.json
          lake exe cache get
          lake build

      - name: Resolve and build pinned Formal Core v3
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        shell: bash
        run: |
          set -euo pipefail
          lake update
          git diff --exit-code -- lake-manifest.json
          lake exe cache get
          lake build

      - name: Reject admitted proofs and local axioms
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results-phase13-complete
          if grep -RInE --include='*.lean' --exclude-dir='.lake' --exclude-dir='audit-results' --exclude-dir='audit-results-phase9' --exclude-dir='audit-results-phase10' --exclude-dir='audit-results-phase10b' --exclude-dir='audit-results-phase10-closure' --exclude-dir='audit-results-phase11-closure' --exclude-dir='audit-results-phase12b-closure' --exclude-dir='audit-results-phase12c-closure' --exclude-dir='audit-results-phase12d-closure' --exclude-dir='audit-results-phase12-complete' --exclude-dir='audit-results-phase13-complete' '(^|[^[:alnum:]_])(sorryAx|sorry|admit)([^[:alnum:]_]|$)' RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean > audit-results-phase13-complete/forbidden_proof_tokens.txt; then
            cat audit-results-phase13-complete/forbidden_proof_tokens.txt
            exit 1
          fi
          : > audit-results-phase13-complete/forbidden_proof_tokens.txt
          if grep -RInE --include='*.lean' --exclude-dir='.lake' --exclude-dir='audit-results' --exclude-dir='audit-results-phase9' --exclude-dir='audit-results-phase10' --exclude-dir='audit-results-phase10b' --exclude-dir='audit-results-phase10-closure' --exclude-dir='audit-results-phase11-closure' --exclude-dir='audit-results-phase12b-closure' --exclude-dir='audit-results-phase12c-closure' --exclude-dir='audit-results-phase12d-closure' --exclude-dir='audit-results-phase12-complete' --exclude-dir='audit-results-phase13-complete' '^[[:space:]]*axiom[[:space:]]' RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean > audit-results-phase13-complete/project_axiom_declarations.txt; then
            cat audit-results-phase13-complete/project_axiom_declarations.txt
            exit 1
          fi
          : > audit-results-phase13-complete/project_axiom_declarations.txt

      - name: Reconstruct authoritative closed Phase 12 trajectory
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/runtime_v3_phase_13/capture
          python python/rcp_rclm_runtime_v3/tools/run_phase12e_closure.py \
            --repo-root . \
            --lean-project-root lean/rcp_rclm_formal_core_v3 \
            --work-root artifacts/runtime_v3_phase_13/capture/phase12_work \
            --out artifacts/runtime_v3_phase_13/capture/phase12_closure.json \
            2>&1 | tee artifacts/runtime_v3_phase_13/capture/phase12_closure_stdout.log

      - name: Build content-addressed independent replay bundle
        run: >-
          python python/rcp_rclm_runtime_v3/tools/build_phase13_trajectory_bundle.py
          --work-root artifacts/runtime_v3_phase_13/capture/phase12_work
          --closure-report artifacts/runtime_v3_phase_13/capture/phase12_closure.json
          --source-head "${PHASE13_SOURCE_HEAD}"
          --bundle-root artifacts/runtime_v3_phase_13/capture_export/trajectory_bundle
          --out artifacts/runtime_v3_phase_13/capture/bundle_manifest.json

      - name: Sanity-check captured structural replay
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase13_structural_replay.py
          --bundle-root artifacts/runtime_v3_phase_13/capture_export/trajectory_bundle
          --repo-root .
          --source-head "${PHASE13_SOURCE_HEAD}"
          --platform-label ubuntu
          --out artifacts/runtime_v3_phase_13/capture/capture_structural.json

      - name: Upload exact trajectory bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-13-trajectory-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/capture_export/
          if-no-files-found: error
          retention-days: 90

      - name: Upload capture audit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-13-capture-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/runtime_v3_phase_13/capture/
            lean/rcp_rclm_formal_core_v3/audit-results-phase13-complete/
          if-no-files-found: error
          retention-days: 90

  portable:
    name: Independent structural replay (${{ matrix.label }})
    needs: capture
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    steps:
      - name: Check out exact replay source head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ env.PHASE13_SOURCE_HEAD }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes without learned workers
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Download exact trajectory bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runtime-v3-phase-13-trajectory-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/input

      - name: Run tool independent structural replay
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase13_structural_replay.py
          --bundle-root artifacts/runtime_v3_phase_13/input/trajectory_bundle
          --repo-root .
          --source-head "${{ env.PHASE13_SOURCE_HEAD }}"
          --platform-label ${{ matrix.label }}
          --out artifacts/runtime_v3_phase_13/portable/${{ matrix.label }}/phase13_structural_${{ matrix.label }}.json

      - name: Run repository independent structural replay
        run: >-
          python scripts/run_phase13_structural_replay.py
          --bundle-root artifacts/runtime_v3_phase_13/input/trajectory_bundle
          --repo-root .
          --source-head "${{ env.PHASE13_SOURCE_HEAD }}"
          --platform-label ${{ matrix.label }}
          --out artifacts/runtime_v3_phase_13/portable/${{ matrix.label }}/phase13_structural_root_${{ matrix.label }}.json

      - name: Require byte-identical portable entry points
        shell: bash
        run: |
          cmp \
            artifacts/runtime_v3_phase_13/portable/${{ matrix.label }}/phase13_structural_${{ matrix.label }}.json \
            artifacts/runtime_v3_phase_13/portable/${{ matrix.label }}/phase13_structural_root_${{ matrix.label }}.json

      - name: Upload portable replay report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-13-portable-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/portable/${{ matrix.label }}/phase13_structural_${{ matrix.label }}.json
          if-no-files-found: error
          retention-days: 90

  pinned:
    name: Pinned Lean and immutable-chain replay (${{ matrix.label }})
    needs: capture
    runs-on: ${{ matrix.os }}
    timeout-minutes: 600
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    steps:
      - name: Check out exact replay source head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ env.PHASE13_SOURCE_HEAD }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes without learned workers
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Download exact trajectory bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runtime-v3-phase-13-trajectory-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/input

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve and build frozen Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        shell: bash
        run: |
          set -euo pipefail
          lake update
          git diff --exit-code -- lake-manifest.json
          lake exe cache get
          lake build

      - name: Resolve and build pinned Formal Core v3
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        shell: bash
        run: |
          set -euo pipefail
          lake update
          git diff --exit-code -- lake-manifest.json
          lake exe cache get
          lake build

      - name: Run tool pinned replay
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase13_pinned_replay.py
          --bundle-root artifacts/runtime_v3_phase_13/input/trajectory_bundle
          --repo-root .
          --lean-project-root lean/rcp_rclm_formal_core_v3
          --work-root artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/tool_work
          --source-head "${{ env.PHASE13_SOURCE_HEAD }}"
          --platform-label ${{ matrix.label }}
          --out artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/phase13_pinned_${{ matrix.label }}.json

      - name: Run repository pinned replay
        run: >-
          python scripts/run_phase13_pinned_replay.py
          --bundle-root artifacts/runtime_v3_phase_13/input/trajectory_bundle
          --repo-root .
          --lean-project-root lean/rcp_rclm_formal_core_v3
          --work-root artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/root_work
          --source-head "${{ env.PHASE13_SOURCE_HEAD }}"
          --platform-label ${{ matrix.label }}
          --out artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/phase13_pinned_root_${{ matrix.label }}.json

      - name: Require byte-identical pinned entry points
        shell: bash
        run: |
          cmp \
            artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/phase13_pinned_${{ matrix.label }}.json \
            artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/phase13_pinned_root_${{ matrix.label }}.json

      - name: Upload pinned replay report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-13-pinned-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/pinned/${{ matrix.label }}/
          if-no-files-found: error
          retention-days: 90

  close:
    name: Close Phase 13 at one exact source head
    needs:
      - portable
      - pinned
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact replay source head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ env.PHASE13_SOURCE_HEAD }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Download portable reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: runtime-v3-phase-13-portable-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/close/portable
          merge-multiple: true

      - name: Download Ubuntu pinned report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runtime-v3-phase-13-pinned-ubuntu-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/close/pinned/ubuntu

      - name: Download Windows pinned report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runtime-v3-phase-13-pinned-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/close/pinned/windows

      - name: Download macOS pinned report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runtime-v3-phase-13-pinned-macos-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/close/pinned/macos

      - name: Emit tool Phase 13 exit report
        run: >-
          python python/rcp_rclm_runtime_v3/tools/close_phase13.py
          --ubuntu artifacts/runtime_v3_phase_13/close/portable/phase13_structural_ubuntu.json
          --windows artifacts/runtime_v3_phase_13/close/portable/phase13_structural_windows.json
          --macos artifacts/runtime_v3_phase_13/close/portable/phase13_structural_macos.json
          --pinned-ubuntu artifacts/runtime_v3_phase_13/close/pinned/ubuntu/phase13_pinned_ubuntu.json
          --pinned-windows artifacts/runtime_v3_phase_13/close/pinned/windows/phase13_pinned_windows.json
          --pinned-macos artifacts/runtime_v3_phase_13/close/pinned/macos/phase13_pinned_macos.json
          --repo-root .
          --source-head "${PHASE13_SOURCE_HEAD}"
          --out artifacts/runtime_v3_phase_13/final/phase13_exit.json

      - name: Emit repository Phase 13 exit report
        run: >-
          python scripts/close_phase13.py
          --ubuntu artifacts/runtime_v3_phase_13/close/portable/phase13_structural_ubuntu.json
          --windows artifacts/runtime_v3_phase_13/close/portable/phase13_structural_windows.json
          --macos artifacts/runtime_v3_phase_13/close/portable/phase13_structural_macos.json
          --pinned-ubuntu artifacts/runtime_v3_phase_13/close/pinned/ubuntu/phase13_pinned_ubuntu.json
          --pinned-windows artifacts/runtime_v3_phase_13/close/pinned/windows/phase13_pinned_windows.json
          --pinned-macos artifacts/runtime_v3_phase_13/close/pinned/macos/phase13_pinned_macos.json
          --repo-root .
          --source-head "${PHASE13_SOURCE_HEAD}"
          --out artifacts/runtime_v3_phase_13/final/phase13_exit_root.json

      - name: Require byte-identical closure entry points
        shell: bash
        run: |
          cmp \
            artifacts/runtime_v3_phase_13/final/phase13_exit.json \
            artifacts/runtime_v3_phase_13/final/phase13_exit_root.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/runtime_v3_phase_13/final/phase13_exit.json").read_text(encoding="utf-8"))
          assert report["accepted"] is True
          assert report["phase13_exit_closed"] is True
          assert report["next_phase"] == 14
          PY

      - name: Validate complete Phase 13 Draft 2020-12 schema
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase13_exit_schema.py
          --schema python/rcp_rclm_executable_core_v3/contract/phase_13_complete_replay.schema.json
          --instance artifacts/runtime_v3_phase_13/final/phase13_exit.json
          --out artifacts/runtime_v3_phase_13/final/phase13_exit_schema.json

      - name: Upload final Phase 13 closure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-13-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/final/
          if-no-files-found: error
          retention-days: 90
