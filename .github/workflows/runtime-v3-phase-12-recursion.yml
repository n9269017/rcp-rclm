name: Runtime v3 Phase 12 self-hosted recursion start

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "docs/executable_core_v3/**"
      - "scripts/run_phase12_recursion.py"
      - ".github/workflows/runtime-v3-phase-12-recursion.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  portable:
    name: Validate Phase 12A recursive start (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile Phase 12 source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase12_recursion.py

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12/${{ matrix.os }}/source_quality.json

      - name: Run retained complete Phase 11 regression
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase11_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12/${{ matrix.os }}/phase_11_tests.log

      - name: Run focused Phase 12 tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12/${{ matrix.os }}/phase_12_tests.log

      - name: Recompute Phase 12A recursive-start reference
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12_reference.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12/${{ matrix.os }}/phase_12_reference.json

      - name: Validate Phase 12A Draft 2020-12 schema
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase12_schema.py
          --schema python/rcp_rclm_executable_core_v3/contract/phase_12_recursive_start.schema.json
          --instance artifacts/runtime_v3_phase_12/${{ matrix.os }}/phase_12_reference.json
          --out artifacts/runtime_v3_phase_12/${{ matrix.os }}/phase_12_schema.json

      - name: Run repository Phase 12 entry point
        run: >-
          python scripts/run_phase12_recursion.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12/${{ matrix.os }}/phase_12_root_entry.json

      - name: Require byte-identical Phase 12 entry points
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("artifacts/runtime_v3_phase_12/${{ matrix.os }}")
          assert (root / "phase_12_reference.json").read_bytes() == (
              root / "phase_12_root_entry.json"
          ).read_bytes()
          PY

      - name: Upload portable Phase 12A evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12a-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Close Phase 12A recursive-start slice
    needs:
      - portable
    runs-on: ubuntu-latest

    steps:
      - name: Emit Phase 12A closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v3_phase_12/final
          {
            echo "phase=12"
            echo "slice=12A"
            echo "commit=${GITHUB_SHA}"
            echo "cross_platform=success"
            echo "phase11_promoted_successor_bound=success"
            echo "generation2_successor_generator_used=success"
            echo "first_recursive_attempt_rejected=success"
            echo "rejection_preserved_active_package=success"
            echo "heldout_material_consumed=false"
            echo "manual_repairs=0"
            echo "accepted_phase12_promotions=0"
            echo "phase12a_recursive_start_closed=true"
            echo "phase12_exit_closed=false"
          } > artifacts/runtime_v3_phase_12/final/closure.txt

      - name: Upload final Phase 12A closure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12a-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12/final/
          if-no-files-found: error
          retention-days: 90
