name: Export minimal Phase 12E validation source

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-12-generator-planner

permissions:
  contents: write

concurrency:
  group: phase12e-min-source-snapshot
  cancel-in-progress: false

jobs:
  export:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Create minimal committed source snapshot
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .phase12e_source_snapshot .phase12e_min_snapshot
          mkdir -p .phase12e_min_snapshot
          tar -czf /tmp/phase12e-min-source.tar.gz \
            python/rcp_rclm_runtime_v2 \
            python/rcp_rclm_runtime_v3 \
            python/rcp_rclm_executable_core_v3 \
            scripts \
            lean \
            docs/formal_core_v3
          sha256sum /tmp/phase12e-min-source.tar.gz \
            > .phase12e_min_snapshot/sha256.txt
          base64 /tmp/phase12e-min-source.tar.gz \
            | split -b 100000 -d -a 3 - .phase12e_min_snapshot/part
          rm -f .github/workflows/phase12e-min-source-export.yml

      - name: Commit minimal snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Retain minimal Phase 12E validation snapshot"
          git push origin HEAD
