name: Runtime v2 Phase 8 independent replay

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "python/rcp_rclm_executable_core_v2/contract/phase_8_independent_replay.schema.json"
      - "scripts/build_replay_bundle.py"
      - "scripts/reproduce_run.py"
      - "docs/executable_core_v2/PHASE_8_*.md"
      - ".github/workflows/runtime-v2-phase-8.yml"
      - "README.md"
  push:
    branches:
      - "agent/rcp-rclm-runtime-v2-phase-8-*"
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "python/rcp_rclm_executable_core_v2/contract/phase_8_independent_replay.schema.json"
      - "scripts/build_replay_bundle.py"
      - "scripts/reproduce_run.py"
      - "docs/executable_core_v2/PHASE_8_*.md"
      - ".github/workflows/runtime-v2-phase-8.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  independent-replay:
    name: Validate Phase 8 independent replay (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2

      - name: Compile Python source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v2
          scripts/check_candidate.py
          scripts/check_hardened_candidate.py
          scripts/generate_reference_candidate.py
          scripts/run_phase5a_reference_loop.py
          scripts/build_candidate_package.py
          scripts/run_promotion_loop.py
          scripts/build_replay_bundle.py
          scripts/reproduce_run.py

      - name: Validate source quality
        run: >-
          python python/rcp_rclm_runtime_v2/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/source_quality.json

      - name: Run Phase 1 regression suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase1_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_1_regression.log

      - name: Run Phase 2 bridge unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase2_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_2_regression.log

      - name: Run Phase 3 checker unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase3_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_3_regression.log

      - name: Run Phase 4 adversarial unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase4_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_4_regression.log

      - name: Run Phase 5A generator unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase5_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_5a_regression.log

      - name: Run Phase 6 successor-package unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase6_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_6_regression.log

      - name: Run Phase 7 promotion-controller unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase7_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_7_regression.log

      - name: Run Phase 8 independent-replay unit suite
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase8_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_8/${{ matrix.os }}/phase_8_unit.log

      - name: Run deterministic Phase 8 reference roundtrip
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase8_reference_suite.py
          --outdir artifacts/runtime_v2_phase_8/${{ matrix.os }}/reference_roundtrip

      - name: Upload Phase 8 platform artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-phase-8-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_8/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  pinned-validation:
    name: Revalidate pinned Lean and independent replay
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository with formal history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Fetch official mathlib build cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build pinned Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results
          lake build > audit-results/phase_8_lake_build.log 2>&1
          tail -n 40 audit-results/phase_8_lake_build.log

      - name: Revalidate Phase 2 differential bridge
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase2_conformance.py
          --repo-root .
          --outdir artifacts/runtime_v2_phase_8/phase_2_conformance
          --timeout-seconds 180

      - name: Revalidate Phase 5A reference loop
        run: >-
          python scripts/run_phase5a_reference_loop.py
          --repo-root .
          --outdir artifacts/runtime_v2_phase_8/phase_5a_reference_loop
          --state all
          --timeout-seconds 180

      - name: Revalidate Phase 6 reference packages
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_phase6_reference_suite.py
          --outdir artifacts/runtime_v2_phase_8/phase_6_reference_suite

      - name: Produce the pinned Phase 7 source trajectory
        run: >-
          python scripts/run_promotion_loop.py
          --repo-root .
          --store-root artifacts/runtime_v2_phase_8/phase_7_source/store
          --out artifacts/runtime_v2_phase_8/phase_7_source/summary.json
          --trajectory
          --timeout-seconds 180

      - name: Build the portable Phase 8 replay bundle
        run: >-
          python scripts/build_replay_bundle.py
          --source-store artifacts/runtime_v2_phase_8/phase_7_source/store
          --output artifacts/runtime_v2_phase_8/phase_8_replay/bundle

      - name: Remove the original generator executable before replay
        shell: bash
        run: |
          set -euo pipefail
          generator_root=python/rcp_rclm_runtime_v2/rcp_rclm_runtime/generator
          mv "$generator_root/process.py" "$generator_root/process.py.phase8-disabled"
          mv "$generator_root/worker.py" "$generator_root/worker.py.phase8-disabled"
          rm -f "$generator_root"/__pycache__/process*.pyc
          rm -f "$generator_root"/__pycache__/worker*.pyc
          test ! -e "$generator_root/process.py"
          test ! -e "$generator_root/worker.py"

      - name: Independently reproduce with pinned Lean and no generator executable
        run: >-
          python scripts/reproduce_run.py
          --repo-root .
          --bundle artifacts/runtime_v2_phase_8/phase_8_replay/bundle
          --outdir artifacts/runtime_v2_phase_8/phase_8_replay/reproduced
          --timeout-seconds 180

      - name: Verify zero original-generator invocations
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(
              Path("artifacts/runtime_v2_phase_8/phase_8_replay/reproduced/summary.json")
              .read_text(encoding="utf-8")
          )
          assert summary["generator_invocations"] == 0
          assert summary["generator_modules_loaded"] == []
          assert summary["replay_report"]["accepted"] is True
          assert summary["bundle_manifest"]["promotion_count"] == 2
          assert summary["bundle_manifest"]["rejection_count"] == 2
          assert len(summary["replay_report"]["package_chain"]) == 3
          PY

      - name: Verify generated Lean source contains no admissions or local axioms
        shell: bash
        run: |
          set -euo pipefail
          generated_root=artifacts/runtime_v2_phase_8
          if grep -RInE \
              --include='*.lean' \
              '(^|[^[:alnum:]_])(sorryAx|sorry|admit)([^[:alnum:]_]|$)' \
              "$generated_root"; then
            echo "Generated Phase 8 source contains an admitted-proof token." >&2
            exit 1
          fi
          if grep -RInE \
              --include='*.lean' \
              '^[[:space:]]*(private[[:space:]]+)?axiom[[:space:]]+' \
              "$generated_root"; then
            echo "Generated Phase 8 source contains a project-local axiom." >&2
            exit 1
          fi

      - name: Upload pinned Phase 8 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-phase-8-pinned-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/runtime_v2_phase_8/phase_2_conformance/
            artifacts/runtime_v2_phase_8/phase_5a_reference_loop/
            artifacts/runtime_v2_phase_8/phase_6_reference_suite/
            artifacts/runtime_v2_phase_8/phase_7_source/
            artifacts/runtime_v2_phase_8/phase_8_replay/
            lean/rcp_rclm_formal_core_v2/audit-results/phase_8_lake_build.log
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Verify Phase 8 independent-replay closure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - independent-replay
      - pinned-validation

    steps:
      - name: Emit closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v2_phase_8/final
          cat > artifacts/runtime_v2_phase_8/final/workflow_closure.json <<JSON
          {
            "schema_id": "runtime.phase_8_workflow_closure.v2",
            "head_sha": "${GITHUB_SHA}",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}",
            "python_platform_count": 3,
            "finite_package_count": 3,
            "promoted_transition_count": 2,
            "rejection_attempt_count": 2,
            "original_generator_invocations_during_replay": 0,
            "original_generator_executable_absent_during_replay": true,
            "fresh_pinned_lean_reverification": true,
            "fresh_hardened_checker_reverification": true,
            "selected_gate_c_regression_revalidated": true,
            "finite_parent_linked_trajectory": true,
            "independent_replay": true,
            "generator_trusted": false,
            "learned_proposal_authority": false,
            "autonomous_unbounded_rsi_claim": false,
            "ok": true
          }
          JSON

      - name: Upload final Phase 8 artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-phase-8-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_8/final/
          if-no-files-found: error
          retention-days: 90
