name: PyTorch Windows admission diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pytorch-windows-admission-diagnostic.yml"
  push:
    branches:
      - agent/rcp-rclm-v2-final-documentation
    paths:
      - ".github/workflows/pytorch-windows-admission-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v2-final-documentation
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
      - run: python -m pip install --disable-pip-version-check torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Run accepted fixture and retain all evidence regardless of verdict
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/pytorch-windows-diagnostic | Out-Null
          python python/rcp_rclm_runtime_v2/tools/run_pytorch_pilot_admission_fixture.py `
            --outdir artifacts/pytorch-windows-diagnostic/accepted `
            --case accepted
          Write-Host "fixture exit code: $LASTEXITCODE"
          $global:LASTEXITCODE = 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: pytorch-windows-admission-diagnostic-${{ github.run_id }}
          path: artifacts/pytorch-windows-diagnostic/
          if-no-files-found: error
          retention-days: 3
