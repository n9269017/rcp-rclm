name: Apply Windows-safe PyTorch pilot test root

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pytorch-windows-admission-diagnostic.yml"
  push:
    branches:
      - agent/rcp-rclm-v2-final-documentation
    paths:
      - ".github/workflows/pytorch-windows-admission-diagnostic.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v2-final-documentation
          fetch-depth: 0
      - name: Shorten temporary root and publish repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("python/rcp_rclm_runtime_v2/tests_pytorch_pilot/test_admission_replay.py")
          text = path.read_text(encoding="utf-8")
          old = 'prefix="rcp-rclm-pytorch-admission-tests-"'
          new = 'prefix="rp-"'
          if old not in text:
              raise RuntimeError("expected PyTorch admission-test prefix not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          rm -f .github/workflows/pytorch-windows-admission-diagnostic.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Use Windows-safe PyTorch admission test paths"
          git push origin HEAD:agent/rcp-rclm-v2-final-documentation
