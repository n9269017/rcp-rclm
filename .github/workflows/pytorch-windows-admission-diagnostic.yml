name: PyTorch Windows admission diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pytorch-windows-admission-diagnostic.yml"
  push:
    branches:
      - agent/rcp-rclm-v2-final-documentation
    paths:
      - ".github/workflows/pytorch-windows-admission-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v2-final-documentation
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
      - run: python -m pip install --disable-pip-version-check torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Run accepted controller and retain report regardless of verdict
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/pytorch-windows-diagnostic | Out-Null
          @'
          from pathlib import Path
          from rcp_rclm_runtime.canonical.json import canonical_json_bytes
          from rcp_rclm_runtime.torch_backend.admission import bootstrap_pytorch_pilot_store, run_pytorch_pilot_controller
          from tests_phase7.phase7_helpers import fixture_lean_evidence
          root = Path("artifacts/pytorch-windows-diagnostic")
          store = root / "store"
          bootstrap_pytorch_pilot_store(store)
          evidence = run_pytorch_pilot_controller(store, fixture_lean_evidence, run_label="pytorch-windows-diagnostic")
          (root / "attempt_report.json").write_bytes(canonical_json_bytes(evidence.attempt_report.to_json()))
          (root / "controller_report.json").write_bytes(canonical_json_bytes(evidence.controller_report.to_json()))
          print(evidence.verdict)
          print(evidence.attempt_report.to_json())
          '@ | Set-Content -Encoding utf8 artifacts/pytorch-windows-diagnostic/run.py
          python artifacts/pytorch-windows-diagnostic/run.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: pytorch-windows-admission-diagnostic-${{ github.run_id }}
          path: artifacts/pytorch-windows-diagnostic/
          if-no-files-found: error
          retention-days: 3
