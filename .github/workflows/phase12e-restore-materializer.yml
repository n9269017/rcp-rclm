name: Restore complete Phase 12E source for Phase 13 replay

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-13-independent-replay

permissions:
  contents: write

concurrency:
  group: phase12e-restore-materializer
  cancel-in-progress: false

jobs:
  restore:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Restore and validate transparent Phase 12E source
        shell: bash
        run: |
          set -euo pipefail
          cat .phase12e_restore/part* | base64 --decode > /tmp/phase12e-restore.tar.gz
          printf '%s  %s\n' \
            '475c48aa9e511b36e669020a307fe4d2960fa4c9350e9a7767de79efae8a56ec' \
            '/tmp/phase12e-restore.tar.gz' | sha256sum -c -
          tar -xzf /tmp/phase12e-restore.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .phase12e_restore
          rm -f .github/workflows/phase12e-restore-materializer.yml

          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e 'python/rcp_rclm_runtime_v3[test]'
          python -m compileall -q \
            python/rcp_rclm_runtime_v3 \
            scripts/run_phase12_complete.py
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out /tmp/phase12e-source-quality.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('/tmp/phase12e-source-quality.json').read_text(encoding='utf-8'))
          assert report['ok'] is True, report
          PY

      - name: Commit restored Phase 12E source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Restore complete Phase 12E source for independent replay'
          git push origin HEAD
