name: Phase 10 Lean diagnostic

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-10-substrate
    paths:
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned.lean"
      - "lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned/Phase10Information.lean"
      - ".github/workflows/phase10-lean-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Compile Phase10Information with pinned Lean
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve dependencies
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Fetch official mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake exe cache get

      - name: Compile predecessor formal modules
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake build RcpRclmFormalCoreV3.Learned.TransformerExtension

      - name: Compile Phase 10 information module
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set +e
          lake env lean RcpRclmFormalCoreV3/Learned/Phase10Information.lean \
            > phase10_information_compile.log 2>&1
          status=$?
          cat phase10_information_compile.log
          echo "$status" > phase10_information_status.txt
          exit "$status"

      - name: Upload exact compiler diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase10-lean-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            lean/rcp_rclm_formal_core_v3/phase10_information_compile.log
            lean/rcp_rclm_formal_core_v3/phase10_information_status.txt
          if-no-files-found: error
          retention-days: 7
