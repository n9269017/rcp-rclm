name: Apply Phase 8 implementation payload

on:
  pull_request:
    branches:
      - main
    paths:
      - ".phase8_payload.gz"
      - ".github/workflows/apply-phase8-payload.yml"
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-phase-8-independent-replay
    paths:
      - ".phase8_payload.gz"
      - ".github/workflows/apply-phase8-payload.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-phase-8-independent-replay
          fetch-depth: 0
          show-progress: false

      - name: Expand validated implementation payload
        id: expand
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash -euxo pipefail <<'SCRIPT' > phase8-apply.log 2>&1
          ls -l .phase8_payload.gz
          python - <<'PY'
          from pathlib import Path
          payload = Path(".phase8_payload.gz").read_bytes()
          print({"payload_bytes": len(payload), "prefix": payload[:4].hex()})
          PY
          git checkout origin/main -- .github/workflows/runtime-v2-phase-7.yml
          python - <<'PY'
          from __future__ import annotations

          import gzip
          import io
          import tarfile
          from pathlib import Path, PurePosixPath

          archive_bytes = gzip.decompress(Path(".phase8_payload.gz").read_bytes())
          repository_root = Path.cwd().resolve(strict=True)
          with tarfile.open(fileobj=io.BytesIO(archive_bytes), mode="r:") as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              print({"member_count": len(names), "first": names[0], "last": names[-1]})
              if names != sorted(names, key=lambda value: value.encode("utf-8")):
                  raise RuntimeError("payload members are not canonically ordered")
              if len(names) != len(set(names)):
                  raise RuntimeError("payload contains duplicate paths")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or not path.parts or ".." in path.parts:
                      raise RuntimeError(f"unsafe payload path: {member.name}")
                  if not member.isfile():
                      raise RuntimeError(
                          f"payload member is not a regular file: {member.name}"
                      )
                  source = archive.extractfile(member)
                  if source is None:
                      raise RuntimeError(
                          f"payload member has no content: {member.name}"
                      )
                  destination = repository_root.joinpath(*path.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(source.read())
                  destination.chmod(0o644)
          PY
          git status --short
          SCRIPT
          status=$?
          printf '%s\n' "$status" > phase8-apply.status
          cat phase8-apply.log
          exit "$status"

      - name: Upload applicator diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase8-applicator-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            phase8-apply.log
            phase8-apply.status
          if-no-files-found: error
          retention-days: 7

      - name: Commit implementation
        if: steps.expand.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f phase8-apply.log phase8-apply.status
          rm -f .phase8_payload.gz
          rm -f .github/workflows/apply-phase8-payload.yml
          rm -f .github/workflows/phase8-source-snapshot.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement Phase 8 independent replay"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-phase-8-independent-replay

      - name: Require successful expansion
        if: steps.expand.outcome != 'success'
        shell: bash
        run: exit 1
