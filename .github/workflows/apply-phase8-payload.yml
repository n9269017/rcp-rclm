name: Apply Phase 8 implementation payload

on:
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-phase-8-independent-replay
    paths:
      - ".phase8_payload.ready"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-phase-8-independent-replay
          fetch-depth: 0

      - name: Expand validated implementation payload
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/runtime-v2-phase-7.yml
          cat .phase8_payload.part* > /tmp/phase8_payload.b64
          python - <<'PY'
          from __future__ import annotations

          import base64
          import bz2
          import io
          import tarfile
          from pathlib import Path, PurePosixPath

          payload = base64.b64decode(
              Path("/tmp/phase8_payload.b64").read_text(encoding="ascii"),
              validate=True,
          )
          archive_bytes = bz2.decompress(payload)
          repository_root = Path.cwd().resolve(strict=True)
          with tarfile.open(fileobj=io.BytesIO(archive_bytes), mode="r:") as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if names != sorted(names, key=lambda value: value.encode("utf-8")):
                  raise RuntimeError("payload members are not canonically ordered")
              if len(names) != len(set(names)):
                  raise RuntimeError("payload contains duplicate paths")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or not path.parts or ".." in path.parts:
                      raise RuntimeError(f"unsafe payload path: {member.name}")
                  if not member.isfile():
                      raise RuntimeError(
                          f"payload member is not a regular file: {member.name}"
                      )
                  source = archive.extractfile(member)
                  if source is None:
                      raise RuntimeError(
                          f"payload member has no content: {member.name}"
                      )
                  destination = repository_root.joinpath(*path.parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(source.read())
                  destination.chmod(0o644)
          PY
          rm -f .phase8_payload.part*
          rm -f .phase8_payload.ready
          rm -f .github/workflows/apply-phase8-payload.yml
          rm -f .github/workflows/phase8-source-snapshot.yml
          git add -A
          git diff --cached --check

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement Phase 8 independent replay"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-phase-8-independent-replay
