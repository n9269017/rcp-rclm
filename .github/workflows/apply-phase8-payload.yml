name: Apply Phase 8 implementation patch

on:
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-phase-8-independent-replay
    paths:
      - ".phase8_patch.ready"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-phase-8-independent-replay
          fetch-depth: 0

      - name: Apply validated implementation patch
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/runtime-v2-phase-7.yml
          cat .phase8_patch.part* > /tmp/phase8.patch
          git apply --index --whitespace=error-all /tmp/phase8.patch
          rm -f .phase8_patch.part*
          rm -f .phase8_patch.ready
          rm -f .github/workflows/apply-phase8-payload.yml
          rm -f .github/workflows/phase8-source-snapshot.yml
          git add -A
          git diff --cached --check

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement Phase 8 independent replay"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-phase-8-independent-replay
