name: Temporary Phase 11 retained closure finalizer

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-11-autonomous-generator
    paths:
      - ".github/workflows/phase11-finalize-retained-head.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase11-finalize-retained-head
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out exact finalizer head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install exact retained final payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import io
          import tarfile
          from pathlib import Path

          chunk_root = Path(".phase11_final_payload")
          expected_chunks = [chunk_root / f"chunk-{index:02d}" for index in range(5)]
          observed_chunks = sorted(path for path in chunk_root.iterdir() if path.is_file())
          if observed_chunks != expected_chunks:
              raise SystemExit(
                  f"unexpected Phase 11 payload chunks: {[str(path) for path in observed_chunks]}"
              )
          encoded = "".join(path.read_text(encoding="ascii") for path in expected_chunks)
          payload = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(payload).hexdigest()
          if digest != "6e7e678569c3c1eb932385425d33d0637037d9e635351c2236aac1be2b672cbe":
              raise SystemExit(f"unexpected Phase 11 final payload digest: {digest}")
          expected_members = {
              ".github/workflows/runtime-v3-phase-11-generator.yml",
              "docs/executable_core_v3/README.md",
              "docs/executable_core_v3/PHASE_11_VALIDATION.md",
              "python/rcp_rclm_runtime_v3/README.md",
              "python/rcp_rclm_runtime_v3/phase_11_closure_manifest.json",
              "python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/closure_manifest.py",
              "python/rcp_rclm_runtime_v3/tests_phase11/test_phase11_closure_manifest.py",
          }
          with tarfile.open(fileobj=io.BytesIO(payload), mode="r:gz") as archive:
              members = archive.getmembers()
              names = {member.name for member in members}
              if names != expected_members:
                  raise SystemExit(f"unexpected Phase 11 payload members: {sorted(names)}")
              for member in members:
                  path = Path(member.name)
                  if (
                      not member.isfile()
                      or path.is_absolute()
                      or ".." in path.parts
                      or member.issym()
                      or member.islnk()
                  ):
                      raise SystemExit(f"unsafe Phase 11 payload member: {member.name}")
              archive.extractall(".")
          PY

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile final Phase 11 sources
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase11_generator.py
          scripts/run_phase11_lifecycle.py

      - name: Validate final source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/phase11_finalizer/source_quality.json

      - name: Run complete Phase 11 tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase11_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/phase11_finalizer/phase_11_tests.log

      - name: Validate corrected retained closure manifest
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase11_closure_manifest.py
          --repo-root .
          --out artifacts/phase11_finalizer/phase_11_closure_manifest.json

      - name: Require clean permanent infrastructure
        shell: bash
        run: |
          set -euo pipefail
          test ! -e .phase11b_payload
          test ! -e .phase11b_source_parts
          test ! -e .github/workflows/phase11b-materialize.yml
          test ! -e .github/workflows/phase11b-source-export.yml
          git diff --check

      - name: Commit the clean final Phase 11 source head
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .phase11_final_payload
          rm .github/workflows/phase11-finalize-retained-head.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- .github/workflows/runtime-v3-phase-11-generator.yml docs/executable_core_v3/README.md docs/executable_core_v3/PHASE_11_VALIDATION.md python/rcp_rclm_runtime_v3/README.md python/rcp_rclm_runtime_v3/phase_11_closure_manifest.json python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/closure_manifest.py python/rcp_rclm_runtime_v3/tests_phase11/test_phase11_closure_manifest.py
          git add -u -- .phase11_final_payload .github/workflows/phase11-finalize-retained-head.yml
          git commit -m "Finalize Phase 11 retained closure head"
          git push origin HEAD:agent/rcp-rclm-v3-phase-11-autonomous-generator

      - name: Upload finalizer validation
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase11-retained-head-finalizer-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase11_finalizer/
          if-no-files-found: error
          retention-days: 7
