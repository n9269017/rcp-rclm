name: Runtime v2 Phase 2 Lean conformance bridge

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "docs/executable_core_v2/**"
      - "lean/rcp_rclm_formal_core_v2/**"
      - ".github/workflows/runtime-v2-phase-2-lean-bridge.yml"
  push:
    branches:
      - "agent/rcp-rclm-runtime-v2-phase-2-lean-bridge"
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "docs/executable_core_v2/**"
      - "lean/rcp_rclm_formal_core_v2/**"
      - ".github/workflows/runtime-v2-phase-2-lean-bridge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-validation:
    name: Validate Phase 2 Python bridge (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2

      - name: Compile Python source
        run: python -m compileall -q python/rcp_rclm_runtime_v2

      - name: Validate source quality
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_2/${{ matrix.os }}/source_quality.json

      - name: Run deterministic Phase 1 and Phase 2 tests
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/run_phase1_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_phase_2/${{ matrix.os }}/unittest.log

      - name: Upload Python bridge validation artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-phase-2-python-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_2/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  lean-integration:
    name: Verify pinned Lean reference packets
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependency graph
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Fetch official mathlib build cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build pinned Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake build

      - name: Run Python Lean differential suite
        run: >-
          python
          python/rcp_rclm_runtime_v2/tools/run_phase2_differential.py
          --repo-root .
          --outdir artifacts/runtime_v2_phase_2/lean_integration
          --timeout-seconds 120

      - name: Upload Lean bridge artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-phase-2-lean-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_2/lean_integration/
          if-no-files-found: error
          retention-days: 90

  phase-2-summary:
    name: Verify Phase 2 closure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - python-validation
      - lean-integration

    steps:
      - name: Write Phase 2 CI summary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v2_phase_2/final
          cat > artifacts/runtime_v2_phase_2/final/phase_2_ci_summary.json <<JSON
          {
            "schema_version": "rcp-rclm-runtime-phase-2-ci-summary-v1",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}",
            "head_sha": "${GITHUB_SHA}",
            "python_platforms": ["ubuntu-latest", "windows-latest", "macos-latest"],
            "lean_integration": true,
            "ok": true
          }
          JSON

      - name: Upload final Phase 2 validation artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-phase-2-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_phase_2/final/
          if-no-files-found: error
          retention-days: 90
