name: Temporary Phase 11 retained-record finalizer

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-11-autonomous-generator
    paths:
      - ".github/workflows/phase11-finalize.yml"
      - ".phase11-finalization-payload.b64"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase11-finalize-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Decode and verify retained-record bundle
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .phase11-finalization-payload.b64 > /tmp/phase11-finalization.tar.gz
          echo "f466a496875295536a0b7f8832635485bdf7ace889f2f66a3fc69af9c53226e0  /tmp/phase11-finalization.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/phase11-finalization.tar.gz
          tar -xzf /tmp/phase11-finalization.tar.gz -C .

      - name: Remove completed implementation scaffolding
        shell: bash
        run: |
          set -euo pipefail
          rm -f .phase11-finalization-payload.b64
          rm -f .github/workflows/phase11-finalize.yml
          rm -f .github/workflows/phase11b-materialize.yml
          rm -f .github/workflows/phase11b-source-export.yml
          rm -rf .phase11b_payload
          rm -rf .phase11b_source_parts

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile finalized Phase 11 source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase11_generator.py
          scripts/run_phase11_lifecycle.py

      - name: Validate finalized source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out /tmp/phase11-final-source-quality.json

      - name: Validate retained Phase 11 closure manifest
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase11_closure_manifest.py
          --repo-root .
          --no-recompute
          --out /tmp/phase11-final-manifest-validation.json

      - name: Commit finalized Phase 11 repository state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No finalization changes were produced" >&2
            exit 1
          fi
          git commit -m "Finalize Phase 11 retained closure"
          git push origin HEAD:agent/rcp-rclm-v3-phase-11-autonomous-generator
