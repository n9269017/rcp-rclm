name: Export Phase 10 working sources

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-phase10-sources.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Upload Phase 10 working sources
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase10-working-sources-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase10/lifecycle.py
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase10/promotion.py
            python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase10/__init__.py
            .github/workflows/runtime-v3-phase-10-learned.yml
          if-no-files-found: error
          retention-days: 7
