name: Runtime v2 Phase 7 promotion controller

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-v2-phase-7.yml"
  push:
    branches:
      - "agent/rcp-rclm-runtime-v2-phase-8-independent-replay"
    paths:
      - ".github/workflows/runtime-v2-phase-7.yml"

permissions:
  contents: read

jobs:
  phase8-source-snapshot:
    name: Phase 8 source snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Upload exact source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase8-source-${{ github.sha }}
          path: |
            .github/workflows/
            python/rcp_rclm_runtime_v2/
            python/rcp_rclm_executable_core_v2/
            scripts/
            docs/executable_core_v2/
            README.md
          if-no-files-found: error
          retention-days: 1
