name: One-shot Gate C source repair

on:
  push:
    branches:
      - agent/rcp-rclm-formal-core-v2-gate-c

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-formal-core-v2-gate-c
          fetch-depth: 0

      - name: Repair the Gate C entropy transport proof
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lean/rcp_rclm_formal_core_v2/RcpRclmFormalCoreV2/RCLM/QuantumBinary.lean")
          text = path.read_text(encoding="utf-8")

          old = '''  · have channelEntropy := selectedChannel_vonNeumannEntropy_preserving
              candidate.update.core (densityOf state).density
            have forwardAction :
                (forwardChannelOf candidate.update).apply (densityOf state).density =
                  (densityOf candidate.next).density := by
              calc
                (forwardChannelOf candidate.update).apply (densityOf state).density =
                    (stateDensity
                      (quantumApply state.core candidate.update.core)).density := by
                  exact selectedChannel_state_action state.core candidate.update.core
                _ = (densityOf candidate.next).density := by
                  exact congrArg (fun coreState => (stateDensity coreState).density) coreTyped.symm
            rw [forwardAction] at channelEntropy
            exact channelEntropy
          · intro reference
            exact selectedChannel_quantumRelativeEntropy_preserving
              candidate.update.core
              (densityOf state).density
              (densityOf reference).density
          '''

          new = '''  · have channelEntropy :
                vonNeumannEntropy
                    ((forwardChannelOf candidate.update).apply (densityOf state).density) =
                  vonNeumannEntropy (densityOf state).density := by
              simpa [forwardChannelOf] using
                selectedChannel_vonNeumannEntropy_preserving
                  candidate.update.core (densityOf state).density
            have forwardAction :
                (forwardChannelOf candidate.update).apply (densityOf state).density =
                  (densityOf candidate.next).density := by
              calc
                (forwardChannelOf candidate.update).apply (densityOf state).density =
                    (stateDensity
                      (quantumApply state.core candidate.update.core)).density := by
                  exact selectedChannel_state_action state.core candidate.update.core
                _ = (densityOf candidate.next).density := by
                  exact congrArg (fun coreState => (stateDensity coreState).density) coreTyped.symm
            calc
              entropyOf candidate.next =
                  vonNeumannEntropy
                    ((forwardChannelOf candidate.update).apply (densityOf state).density) := by
                simpa [entropyOf] using
                  congrArg vonNeumannEntropy forwardAction.symm
              _ = entropyOf state := by
                simpa [entropyOf] using channelEntropy
          · intro reference
            simpa [forwardChannelOf, relativeEntropyOf] using
              selectedChannel_quantumRelativeEntropy_preserving
                candidate.update.core
                (densityOf state).density
                (densityOf reference).density
          '''

          if old not in text:
              raise SystemExit("Expected Gate C proof block was not found; refusing to modify the file.")

          updated = text.replace(old, new, 1)
          if any(token in updated for token in ("sorry", "sorryAx", "admit")):
              raise SystemExit("Forbidden proof placeholder detected after replacement.")

          path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit repaired Lean source
        shell: bash
        run: |
          if git diff --quiet -- lean/rcp_rclm_formal_core_v2/RcpRclmFormalCoreV2/RCLM/QuantumBinary.lean; then
            echo "No source change was produced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lean/rcp_rclm_formal_core_v2/RcpRclmFormalCoreV2/RCLM/QuantumBinary.lean
          git commit -m "Repair Gate C entropy transport proof"
          git push origin HEAD:agent/rcp-rclm-formal-core-v2-gate-c
