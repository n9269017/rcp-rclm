name: Materialize complete Phase 12 trajectory

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-12-generator-planner

permissions:
  contents: write

concurrency:
  group: phase12e-materializer
  cancel-in-progress: false

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Decode and install Phase 12E implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .phase12e_payload/part* | base64 --decode > /tmp/phase12e-implementation.tar.gz
          tar -xzf /tmp/phase12e-implementation.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .phase12e_payload
          rm -f .phase12e_source_artifact.json
          rm -f .github/workflows/phase12d-docs-finalizer.yml
          rm -f .github/workflows/phase12e-materializer.yml
          python -m compileall -q \
            python/rcp_rclm_runtime_v3 \
            scripts/run_phase12_complete.py
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py \
            --package-root python/rcp_rclm_runtime_v3 \
            --out /tmp/phase12e-source-quality.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('/tmp/phase12e-source-quality.json').read_text(encoding='utf-8'))
          assert report['ok'] is True, report
          PY

      - name: Commit complete Phase 12 implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement complete Phase 12 self-hosted trajectory"
          git push origin HEAD
