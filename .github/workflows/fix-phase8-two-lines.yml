name: Fix Phase 8 cross-platform replay closure

on:
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-phase-8-independent-replay
    paths:
      - ".github/workflows/fix-phase8-two-lines.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out canonical Phase 8 branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-phase-8-independent-replay
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Apply exact Phase 8 repairs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          test_path = Path(
              "python/rcp_rclm_runtime_v2/tests_phase8/test_independent_replay.py"
          )
          test_source = test_path.read_text(encoding="utf-8")
          old_test = '        self.assertEqual(completed.stdout, b"0\\n0\\n")\n'
          new_test = (
              '        self.assertEqual(completed.stdout.splitlines(), [b"0", b"0"])\n'
          )
          if test_source.count(old_test) != 1:
              raise RuntimeError("unexpected Windows-newline assertion occurrence count")
          test_path.write_text(
              test_source.replace(old_test, new_test),
              encoding="utf-8",
          )

          script_path = Path("scripts/reproduce_run.py")
          script_source = script_path.read_text(encoding="utf-8")
          old_script = '        "bundle_manifest": bundle.manifest.to_json(),\n'
          new_script = '        "bundle_manifest": bundle.to_json(),\n'
          if script_source.count(old_script) != 1:
              raise RuntimeError("unexpected replay-manifest expression occurrence count")
          script_path.write_text(
              script_source.replace(old_script, new_script),
              encoding="utf-8",
          )
          PY

      - name: Validate repaired Phase 8 source
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m compileall -q python/rcp_rclm_runtime_v2 scripts
          python python/rcp_rclm_runtime_v2/tools/run_phase8_tests.py \
            --package-root python/rcp_rclm_runtime_v2 \
            --out /tmp/phase8-tests.log

      - name: Commit repairs and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-phase8-two-lines.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix Phase 8 cross-platform and replay summary closure"
          git push origin HEAD:agent/rcp-rclm-runtime-v2-phase-8-independent-replay
