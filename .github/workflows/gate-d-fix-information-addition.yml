name: Gate D information proof repair

on:
  push:
    branches:
      - agent/rcp-rclm-v3-gate-d-learned-frontier
    paths:
      - ".github/workflows/gate-d-fix-information-addition.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v3-gate-d-learned-frontier
          fetch-depth: 0
      - name: Repair information inequality orientation and publish
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("lean/rcp_rclm_formal_core_v3/RcpRclmFormalCoreV3/Learned/Trajectory.lean")
          text = path.read_text(encoding="utf-8")
          old = "          add_le_add_right previous _\n"
          new = "          add_le_add_left previous _\n"
          if text.count(old) != 1:
              raise RuntimeError(f"expected one information addition proof, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          rm -f .github/workflows/gate-d-fix-information-addition.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Repair Gate D information non-regression proof"
          git push origin HEAD:agent/rcp-rclm-v3-gate-d-learned-frontier
