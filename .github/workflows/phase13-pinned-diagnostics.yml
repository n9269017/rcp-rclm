name: Diagnose Phase 13 pinned replay portability

on:
  push:
    branches:
      - agent/phase13-pinned-diagnostics
    paths:
      - ".github/workflows/phase13-pinned-diagnostics.yml"
  pull_request:
    branches:
      - agent/rcp-rclm-v3-phase-13-independent-replay
    paths:
      - ".github/workflows/phase13-pinned-diagnostics.yml"

permissions:
  actions: read
  contents: read

jobs:
  pinned-diagnostic:
    name: Retain pinned replay traceback (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    env:
      PHASE13_SOURCE_HEAD: e583ef98274db2d3ebf7dd38baf0d7318d36fe85
    steps:
      - name: Check out exact replay source head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ env.PHASE13_SOURCE_HEAD }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes without learned workers
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Download retained exact trajectory bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runtime-v3-phase-13-trajectory-30063133440-1
          path: artifacts/runtime_v3_phase_13/input
          github-token: ${{ github.token }}
          repository: n9269017/rcp-rclm
          run-id: 30063133440

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve and build frozen Formal Core v2
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        shell: bash
        run: |
          set -euo pipefail
          lake update
          git diff --exit-code -- lake-manifest.json
          lake exe cache get
          lake build

      - name: Resolve and build pinned Formal Core v3
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        shell: bash
        run: |
          set -euo pipefail
          lake update
          git diff --exit-code -- lake-manifest.json
          lake exe cache get
          lake build

      - name: Record checkout byte diagnostics
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="artifacts/runtime_v3_phase_13/diagnostic/${{ matrix.label }}"
          mkdir -p "$diagnostic"
          python - <<'PY' > "$diagnostic/checkout_bytes.json"
          import hashlib
          import json
          from pathlib import Path

          paths = (
              ".gitattributes",
              "docs/executable_core_v3/PHASE_12_EXIT_CRITERIA.md",
              "docs/executable_core_v3/PHASE_12_VALIDATION.md",
              "python/rcp_rclm_runtime_v3/phase_10_closure_manifest.json",
              "python/rcp_rclm_runtime_v3/phase_11_closure_manifest.json",
              "lean/rcp_rclm_formal_core_v2/lake-manifest.json",
              "lean/rcp_rclm_formal_core_v2/lakefile.toml",
              "lean/rcp_rclm_formal_core_v3/lake-manifest.json",
              "lean/rcp_rclm_formal_core_v3/lakefile.toml",
          )
          report = {}
          for relative in paths:
              data = Path(relative).read_bytes()
              report[relative] = {
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
                  "crlf_count": data.count(b"\r\n"),
                  "lf_count": data.count(b"\n"),
              }
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Run pinned replay and retain complete traceback
        shell: bash
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          set +e
          diagnostic="artifacts/runtime_v3_phase_13/diagnostic/${{ matrix.label }}"
          python python/rcp_rclm_runtime_v3/tools/run_phase13_pinned_replay.py \
            --bundle-root artifacts/runtime_v3_phase_13/input/trajectory_bundle \
            --repo-root . \
            --lean-project-root lean/rcp_rclm_formal_core_v3 \
            --work-root "$diagnostic/tool_work" \
            --source-head "${PHASE13_SOURCE_HEAD}" \
            --platform-label "${{ matrix.label }}" \
            --out "$diagnostic/phase13_pinned_${{ matrix.label }}.json" \
            > "$diagnostic/pinned_replay.log" 2>&1
          status=$?
          cat "$diagnostic/pinned_replay.log"
          printf '%s\n' "$status" > "$diagnostic/exit_code.txt"
          exit "$status"

      - name: Upload retained pinned diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase13-pinned-diagnostic-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_13/diagnostic/${{ matrix.label }}/
          if-no-files-found: error
          retention-days: 7
