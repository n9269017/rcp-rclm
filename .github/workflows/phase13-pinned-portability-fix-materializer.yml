name: Materialize Phase 13 pinned portability repair

on:
  push:
    branches:
      - agent/phase13-pinned-portability-fix-materializer
    paths:
      - ".phase13_portability_fix/**"
      - ".github/workflows/phase13-pinned-portability-fix-materializer.yml"

permissions:
  contents: write

concurrency:
  group: phase13-pinned-portability-fix-materializer
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out staged repair
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify and extract deterministic repair
        shell: bash
        run: |
          set -euo pipefail
          cat .phase13_portability_fix/part* > /tmp/phase13-portability-fix.b64
          base64 --decode /tmp/phase13-portability-fix.b64 > /tmp/phase13-portability-fix.tar.gz
          echo "f3ccdc44fed70e0083b240248c81bc69a58447deaaca0fd71f2d38e6129d5fc6  /tmp/phase13-portability-fix.tar.gz" | sha256sum --check --strict
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import tarfile

          archive = Path('/tmp/phase13-portability-fix.tar.gz')
          expected = 9
          with tarfile.open(archive, 'r:gz') as handle:
              members = handle.getmembers()
              if len(members) != expected:
                  raise SystemExit(f'unexpected repair entry count: {len(members)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe repair path: {member.name}')
                  if not member.isfile():
                      raise SystemExit(f'non-regular repair entry: {member.name}')
          PY
          tar -xzf /tmp/phase13-portability-fix.tar.gz -C .
          rm -rf .phase13_portability_fix
          rm -f .github/workflows/phase13-pinned-portability-fix-materializer.yml

      - name: Install deterministic test runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile repaired source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out /tmp/phase13-portability-source-quality.json

      - name: Run focused Phase 13 tests
        run: >-
          python -m unittest discover
          -s python/rcp_rclm_runtime_v3/tests_phase13
          -p 'test_*.py'
          -v

      - name: Verify complete task-process migration and LF policy
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          files = (
              Path('python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase10/tasks.py'),
              Path('python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase11/phase11b_tasks.py'),
              Path('python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase12/phase12b_tasks.py'),
              Path('python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase12/phase12c_tasks.py'),
              Path('python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase12/phase12d_tasks.py'),
              Path('python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase12/phase12e_tasks.py'),
          )
          expected_import = 'from rcp_rclm_runtime_v3.phase10.lean_process import run_pinned_lean_source'
          for path in files:
              text = path.read_text(encoding='utf-8')
              if expected_import not in text or '["lake"' in text or 'timeout=120' in text or 'timeout=60' in text:
                  raise SystemExit(f'incomplete pinned Lean process migration: {path}')
          attributes = Path('.gitattributes').read_text(encoding='utf-8').splitlines()
          if not attributes or attributes[0] != '* text=auto eol=lf':
              raise SystemExit('global LF checkout policy is not installed')
          PY

      - name: Reject whitespace errors
        run: git diff --check

      - name: Commit validated repair on staging branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/rcp-rclm-v3-phase-13-independent-replay
          test "$(git rev-parse FETCH_HEAD)" = "e583ef98274db2d3ebf7dd38baf0d7318d36fe85"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix cross-platform Phase 13 pinned replay"
          git push origin HEAD:agent/phase13-pinned-portability-fix-materializer
