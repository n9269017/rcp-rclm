name: Export Phase 12E source snapshot

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase12e-source-export.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase12e-source-export-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/source
          tar \
            --exclude='.git' \
            --exclude='artifacts' \
            -czf artifacts/source/rcp-rclm-phase12e-source.tar.gz .
          sha256sum artifacts/source/rcp-rclm-phase12e-source.tar.gz \
            > artifacts/source/sha256.txt

      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase12e-source-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/source/
          if-no-files-found: error
          retention-days: 7
