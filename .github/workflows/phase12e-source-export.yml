name: Export temporary Phase 12E source snapshot

on:
  push:
    branches:
      - agent/rcp-rclm-v3-phase-12-generator-planner

permissions:
  contents: write

concurrency:
  group: phase12e-source-snapshot
  cancel-in-progress: false

jobs:
  export:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Create committed source snapshot
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .phase12e_source_snapshot
          mkdir -p .phase12e_source_snapshot
          tar \
            --exclude='.git' \
            --exclude='artifacts' \
            --exclude='.phase12e_source_snapshot' \
            --exclude='.github/workflows/phase12e-source-export.yml' \
            -czf /tmp/phase12e-source.tar.gz .
          sha256sum /tmp/phase12e-source.tar.gz \
            > .phase12e_source_snapshot/sha256.txt
          base64 /tmp/phase12e-source.tar.gz \
            | split -b 80000 -d -a 3 - .phase12e_source_snapshot/part
          rm -f .github/workflows/phase12e-source-export.yml

      - name: Commit snapshot for local validation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Retain temporary Phase 12E source snapshot"
          git push origin HEAD
