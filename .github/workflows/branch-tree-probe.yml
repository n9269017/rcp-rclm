name: Branch tree probe

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/branch-tree-probe.yml"
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-pytorch-pilot
    paths:
      - ".github/workflows/branch-tree-probe.yml"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out canonical branch head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-runtime-v2-pytorch-pilot
          fetch-depth: 1
      - name: Record commit and tree object IDs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/branch-tree-probe
          {
            echo "HEAD_SHA=$(git rev-parse HEAD)"
            echo "TREE_SHA=$(git rev-parse 'HEAD^{tree}')"
          } | tee artifacts/branch-tree-probe/tree.txt
      - name: Upload tree probe
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: branch-tree-probe-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/branch-tree-probe/tree.txt
          if-no-files-found: error
          retention-days: 1
