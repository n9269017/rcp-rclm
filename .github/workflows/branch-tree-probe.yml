name: Branch tree probe

on:
  push:
    branches:
      - agent/rcp-rclm-runtime-v2-pytorch-pilot
    paths:
      - ".github/workflows/branch-tree-probe.yml"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out branch head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
      - name: Print commit and tree object IDs
        shell: bash
        run: |
          set -euo pipefail
          echo "HEAD_SHA=$(git rev-parse HEAD)"
          echo "TREE_SHA=$(git rev-parse 'HEAD^{tree}')"
