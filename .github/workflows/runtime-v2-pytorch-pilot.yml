name: Runtime v2 first PyTorch learned-successor pilot

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "python/rcp_rclm_executable_core_v2/contract/pytorch_pilot.schema.json"
      - "scripts/run_pytorch_pilot.py"
      - "docs/executable_core_v2/PYTORCH_PILOT*.md"
      - ".github/workflows/runtime-v2-pytorch-pilot.yml"
      - "README.md"
  push:
    branches:
      - "agent/rcp-rclm-runtime-v2-pytorch-*"
    paths:
      - "python/rcp_rclm_runtime_v2/**"
      - "python/rcp_rclm_executable_core_v2/contract/pytorch_pilot.schema.json"
      - "scripts/run_pytorch_pilot.py"
      - "docs/executable_core_v2/PYTORCH_PILOT*.md"
      - ".github/workflows/runtime-v2-pytorch-pilot.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  CUDA_VISIBLE_DEVICES: ""
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  VECLIB_MAXIMUM_THREADS: "1"

jobs:
  pilot:
    name: Validate CPU-only PyTorch pilot (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime package
        run: python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2

      - name: Install pinned CPU PyTorch on Linux and Windows
        if: runner.os != 'macOS'
        run: >-
          python -m pip install --disable-pip-version-check
          torch==2.10.0
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install pinned PyTorch on macOS
        if: runner.os == 'macOS'
        run: python -m pip install --disable-pip-version-check torch==2.10.0

      - name: Verify frozen PyTorch and CPU boundary
        run: >-
          python -c
          "import torch;
          assert torch.__version__.split('+', 1)[0] == '2.10.0';
          assert not torch.cuda.is_available();
          assert torch.get_num_threads() >= 1;
          print(torch.__version__)"

      - name: Compile Python source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v2
          scripts/run_pytorch_pilot.py

      - name: Validate source quality and torch import boundary
        run: >-
          python python/rcp_rclm_runtime_v2/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_pytorch_pilot/${{ matrix.os }}/source_quality.json

      - name: Verify trusted runtime imports do not load PyTorch
        run: >-
          python -c
          "import sys;
          import rcp_rclm_runtime.canonical.json;
          import rcp_rclm_runtime.checker.aggregate;
          import rcp_rclm_runtime.promotion.controller;
          import rcp_rclm_runtime.replay.reproduce;
          assert 'torch' not in sys.modules"

      - name: Run focused PyTorch pilot tests
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_pytorch_pilot_tests.py
          --package-root python/rcp_rclm_runtime_v2
          --out artifacts/runtime_v2_pytorch_pilot/${{ matrix.os }}/pilot_tests.log

      - name: Run deterministic two-process Phase 6 reference path
        run: >-
          python python/rcp_rclm_runtime_v2/tools/run_pytorch_pilot_reference.py
          --outdir artifacts/runtime_v2_pytorch_pilot/${{ matrix.os }}/reference

      - name: Verify reference summary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(
              Path("artifacts/runtime_v2_pytorch_pilot/${{ matrix.os }}/reference/summary.json")
              .read_text(encoding="utf-8")
          )
          assert summary["all_expectations_met"] is True
          assert summary["proposal_processes"] == 2
          assert summary["semantic_replay_equal"] is True
          assert summary["torch_loaded_by_host_evaluator"] is False
          assert summary["evaluation"]["objective_improved"] is True
          assert summary["evaluation"]["protected_nonregression"] is True
          assert summary["evaluation"]["torch_used_for_evaluation"] is False
          assert summary["phase6_rollback_verified"] is True
          assert summary["promotion_attempted"] is False
          assert summary["formal_checker_claimed_for_model_objective"] is False
          PY

      - name: Upload platform evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-pytorch-pilot-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_pytorch_pilot/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Verify first PyTorch pilot proposal closure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - pilot

    steps:
      - name: Emit closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v2_pytorch_pilot/final
          cat > artifacts/runtime_v2_pytorch_pilot/final/workflow_closure.json <<JSON
          {
            "schema_id": "runtime.pytorch_pilot_workflow_closure.v1",
            "head_sha": "${GITHUB_SHA}",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}",
            "platform_count": 3,
            "pytorch_version": "2.10.0",
            "cpu_only": true,
            "proposal_processes_per_platform": 2,
            "framework_independent_evaluation": true,
            "phase6_candidate_package": true,
            "phase6_rollback_verified": true,
            "promotion_attempted": false,
            "pilot_proposal_stage_ok": true
          }
          JSON

      - name: Upload closure record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-v2-pytorch-pilot-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v2_pytorch_pilot/final/
          if-no-files-found: error
          retention-days: 90
