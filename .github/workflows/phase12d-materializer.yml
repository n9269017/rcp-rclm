name: Materialize Phase 12D sources

on:
  pull_request:
    branches:
      - main
    paths:
      - ".phase12d_payload/**"
      - ".github/workflows/phase12d-materializer.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase12d-materializer-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Decode and materialize Phase 12D
        id: materialize
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/phase12d-materializer
          {
            set -x
            cat .phase12d_payload/part* | base64 --decode > /tmp/phase12d-payload.tar.gz
            mkdir -p /tmp/phase12d-payload
            tar -xzf /tmp/phase12d-payload.tar.gz -C /tmp/phase12d-payload
            python /tmp/phase12d-payload/materialize.py \
              --repo-root "$GITHUB_WORKSPACE" \
              --payload-root /tmp/phase12d-payload
            python -m compileall -q \
              python/rcp_rclm_runtime_v3 \
              scripts/run_phase12_generator_planner.py
          } > artifacts/phase12d-materializer/materializer.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 80 artifacts/phase12d-materializer/materializer.log
          exit 0

      - name: Upload materializer diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase12d-materializer-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase12d-materializer/
          if-no-files-found: error
          retention-days: 7

      - name: Remove transport and one-shot workflow
        if: steps.materialize.outputs.status == '0'
        shell: bash
        run: |
          rm -rf .phase12d_payload
          rm -f .github/workflows/phase12d-materializer.yml

      - name: Commit materialized source
        if: steps.materialize.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement Phase 12D generator and planner successor"
          git push origin HEAD

      - name: Fail if materialization failed
        if: steps.materialize.outputs.status != '0'
        shell: bash
        run: exit 1
