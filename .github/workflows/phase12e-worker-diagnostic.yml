name: Diagnose Phase 12E isolated worker evidence

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase12e-worker-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase12e-worker-diagnostic-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install isolated training runtime
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[phase10-train,test]"
      - name: Run worker and retain every acceptance predicate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/phase12e-worker-diagnostic/work
          python - <<'PY'
          from pathlib import Path
          from rcp_rclm_runtime.canonical.hashing import canonical_json_hash
          from rcp_rclm_runtime.canonical.json import canonical_json_bytes
          from rcp_rclm_runtime_v3.phase12.phase12e_training_binding import load_phase12e_training_binding
          binding = load_phase12e_training_binding(Path("python/rcp_rclm_runtime_v3/rcp_rclm_runtime_v3/phase12/phase12e_training_binding.json"))
          request = binding["request"]
          Path("artifacts/phase12e-worker-diagnostic/work/request.json").write_bytes(canonical_json_bytes(request))
          Path("artifacts/phase12e-worker-diagnostic/host.txt").write_text(
              "request_hash=" + canonical_json_hash(request) + "\n"
              + "binding_request_hash=" + str(binding["request_hash"]) + "\n"
              + "semantic_candidate_tensor_hash=" + str(binding["semantic_candidate_tensor_hash"]) + "\n",
              encoding="utf-8",
          )
          PY
          cp python/rcp_rclm_runtime_v3/tools/phase12e_training_worker.py artifacts/phase12e-worker-diagnostic/work/worker.py
          cd artifacts/phase12e-worker-diagnostic/work
          set +e
          env -i \
            PATH="$PATH" \
            HOME="$HOME" \
            CUDA_VISIBLE_DEVICES='' \
            OMP_NUM_THREADS=1 \
            MKL_NUM_THREADS=1 \
            OPENBLAS_NUM_THREADS=1 \
            PYTHONHASHSEED=0 \
            TOKENIZERS_PARALLELISM=false \
            python -I -B worker.py \
              --request request.json \
              --tensor-out candidate.i16le.bin \
              --report-out training_report.json \
              > stdout.bin 2> stderr.bin
          rc=$?
          set -e
          printf '%s\n' "$rc" > return_code.txt
          cd ../../..
          python - <<'PY'
          import json
          from pathlib import Path
          from rcp_rclm_runtime.canonical.hashing import canonical_json_hash, sha256_hex
          from rcp_rclm_runtime.canonical.json import canonical_json_bytes, load_json_strict
          root = Path("artifacts/phase12e-worker-diagnostic/work")
          request = load_json_strict((root / "request.json").read_bytes(), require_canonical=True)
          report = None
          if (root / "training_report.json").is_file():
              report = load_json_strict((root / "training_report.json").read_bytes(), require_canonical=True)
          candidate = (root / "candidate.i16le.bin").read_bytes() if (root / "candidate.i16le.bin").is_file() else b""
          stdout = (root / "stdout.bin").read_bytes()
          stderr = (root / "stderr.bin").read_bytes()
          expected_empty = sha256_hex(b"")
          request_hash = canonical_json_hash(request)
          content = {
              "schema_id": "runtime.v3.phase12e.worker_diagnostic.v1",
              "return_code": int((root / "return_code.txt").read_text().strip()),
              "request_hash": request_hash,
              "worker_report": report,
              "candidate_tensor_sha256": sha256_hex(candidate),
              "candidate_size": len(candidate),
              "stdout_sha256": sha256_hex(stdout),
              "stdout_size": len(stdout),
              "stderr_sha256": sha256_hex(stderr),
              "stderr_size": len(stderr),
              "checks": {
                  "worker_report_accepted": isinstance(report, dict) and report.get("accepted") is True,
                  "request_hash_matches": isinstance(report, dict) and report.get("request_hash") == request_hash,
                  "candidate_hash_matches": isinstance(report, dict) and report.get("candidate_tensor_sha256") == sha256_hex(candidate),
                  "heldout_not_consumed": isinstance(report, dict) and report.get("heldout_material_consumed") is False,
                  "stdout_empty": sha256_hex(stdout) == expected_empty,
                  "stderr_empty": sha256_hex(stderr) == expected_empty,
              },
          }
          Path("artifacts/phase12e-worker-diagnostic/diagnostic.json").write_bytes(canonical_json_bytes(content))
          PY
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase12e-worker-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/phase12e-worker-diagnostic/
          if-no-files-found: error
          retention-days: 7
