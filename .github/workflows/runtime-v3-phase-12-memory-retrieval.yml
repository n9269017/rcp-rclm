name: Runtime v3 Phase 12 memory and retrieval successor

on:
  pull_request:
    branches:
      - main
    paths:
      - "python/rcp_rclm_runtime_v3/**"
      - "python/rcp_rclm_executable_core_v3/**"
      - "docs/executable_core_v3/**"
      - "scripts/run_phase12_memory_retrieval.py"
      - ".github/workflows/runtime-v3-phase-12-memory-retrieval.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  portable:
    name: Validate Phase 12C memory/retrieval successor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deterministic runtimes
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Compile complete Phase 12C source
        run: >-
          python -m compileall -q
          python/rcp_rclm_runtime_v3
          scripts/run_phase12_memory_retrieval.py

      - name: Validate deterministic source quality
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_source_quality.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12c/${{ matrix.os }}/source_quality.json

      - name: Validate retained Phase 11 closure dependency
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase11_closure_manifest.py
          --repo-root .
          --no-recompute
          --out artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_11_closure_manifest.json

      - name: Run complete focused Phase 12 tests
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12_tests.py
          --package-root python/rcp_rclm_runtime_v3
          --out artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_12_tests.log

      - name: Recompute Phase 12C reference
        run: >-
          python python/rcp_rclm_runtime_v3/tools/run_phase12c_reference.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_12c_reference.json

      - name: Validate Phase 12C Draft 2020-12 schema
        run: >-
          python python/rcp_rclm_runtime_v3/tools/validate_phase12c_schema.py
          --schema python/rcp_rclm_executable_core_v3/contract/phase_12_memory_retrieval.schema.json
          --instance artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_12c_reference.json
          --out artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_12c_schema.json

      - name: Run repository Phase 12C entry point
        run: >-
          python scripts/run_phase12_memory_retrieval.py
          --repo-root .
          --out artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_12c_root_entry.json

      - name: Require byte-identical Phase 12C entry points
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("artifacts/runtime_v3_phase_12c/${{ matrix.os }}")
          assert (root / "phase_12c_reference.json").read_bytes() == (
              root / "phase_12c_root_entry.json"
          ).read_bytes()
          PY

      - name: Verify portable Phase 12C boundary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("artifacts/runtime_v3_phase_12c/${{ matrix.os }}/phase_12c_reference.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          assert report["accepted"] is True
          assert report["invalid_proposal_package_unchanged"] is True
          assert report["deterministic_replays"] is True
          assert len(report["frontier_before"]) == 4
          assert len(report["frontier_after"]) == 5
          assert report["new_task_ids"] == ["lean.phase12.generation2.zero_le_macro"]
          assert report["changed_components"] == ["memory_state", "retrieval_policy"]
          ledger = report["progress_ledger"]
          assert ledger["generator_invocations"] == 4
          assert ledger["rejected_attempts"] == 2
          assert ledger["candidate_realizations"] == 2
          assert ledger["candidate_evaluations"] == 2
          assert ledger["accepted_promotions"] == 1
          assert ledger["frontier_expansions"] == 1
          assert ledger["manual_repairs"] == 0
          assert report["heldout_material_consumed"] is False
          PY

      - name: Upload portable Phase 12C evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12c-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12c/${{ matrix.os }}/
          if-no-files-found: error
          retention-days: 90

  pinned-closure:
    name: Reject the second attempt and promote M2 with pinned Lean
    needs:
      - portable
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository with formal history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install deterministic runtimes without training backend
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e python/rcp_rclm_runtime_v2
          python -m pip install --disable-pip-version-check -e "python/rcp_rclm_runtime_v3[test]"

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve frozen Formal Core v2 dependencies
        working-directory: lean/rcp_rclm_formal_core_v2
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify frozen Formal Core v2 manifest
        working-directory: lean/rcp_rclm_formal_core_v2
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official v2 mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v2
        run: lake exe cache get

      - name: Build frozen Formal Core v2 bridge
        working-directory: lean/rcp_rclm_formal_core_v2
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../rcp_rclm_formal_core_v3/audit-results-phase12c-closure
          lake build 2>&1 | tee ../rcp_rclm_formal_core_v3/audit-results-phase12c-closure/formal_core_v2_build.log

      - name: Resolve pinned Formal Core v3 dependency graph
        working-directory: lean/rcp_rclm_formal_core_v3
        env:
          MATHLIB_NO_CACHE_ON_UPDATE: "1"
        run: lake update

      - name: Verify committed Formal Core v3 manifest
        working-directory: lean/rcp_rclm_formal_core_v3
        run: git diff --exit-code -- lake-manifest.json

      - name: Fetch official v3 mathlib cache
        working-directory: lean/rcp_rclm_formal_core_v3
        run: lake exe cache get

      - name: Build complete Formal Core v3
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -o pipefail
          mkdir -p audit-results-phase12c-closure
          lake build 2>&1 | tee audit-results-phase12c-closure/lake_build.log

      - name: Reject admitted proofs and local axioms
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              --exclude-dir='audit-results-phase9' \
              --exclude-dir='audit-results-phase10' \
              --exclude-dir='audit-results-phase10b' \
              --exclude-dir='audit-results-phase10-closure' \
              --exclude-dir='audit-results-phase11-closure' \
              --exclude-dir='audit-results-phase12b-closure' \
              --exclude-dir='audit-results-phase12c-closure' \
              '(^|[^[:alnum:]_])(sorryAx|sorry|admit)([^[:alnum:]_]|$)' \
              RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean \
              > audit-results-phase12c-closure/forbidden_proof_tokens.txt; then
            cat audit-results-phase12c-closure/forbidden_proof_tokens.txt
            exit 1
          fi
          : > audit-results-phase12c-closure/forbidden_proof_tokens.txt
          if grep -RInE \
              --include='*.lean' \
              --exclude-dir='.lake' \
              --exclude-dir='audit-results' \
              --exclude-dir='audit-results-phase9' \
              --exclude-dir='audit-results-phase10' \
              --exclude-dir='audit-results-phase10b' \
              --exclude-dir='audit-results-phase10-closure' \
              --exclude-dir='audit-results-phase11-closure' \
              --exclude-dir='audit-results-phase12b-closure' \
              --exclude-dir='audit-results-phase12c-closure' \
              '^[[:space:]]*axiom[[:space:]]' \
              RcpRclmFormalCoreV3 RcpRclmFormalCoreV3.lean \
              > audit-results-phase12c-closure/project_axiom_declarations.txt; then
            cat audit-results-phase12c-closure/project_axiom_declarations.txt
            exit 1
          fi
          : > audit-results-phase12c-closure/project_axiom_declarations.txt

      - name: Audit inherited selected information theorems
        working-directory: lean/rcp_rclm_formal_core_v3
        shell: bash
        run: |
          set -euo pipefail
          lake env lean ../../docs/formal_core_v3/audit/Phase10InformationAxiomAudit.lean \
            2>&1 | tee audit-results-phase12c-closure/phase_10_information_axioms.txt
          if grep -Fq 'sorryAx' audit-results-phase12c-closure/phase_10_information_axioms.txt; then
            exit 1
          fi

      - name: Execute authoritative Phase 12C rejection and promotion
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/runtime_v3_phase_12c/pinned
          python python/rcp_rclm_runtime_v3/tools/run_phase12c_closure.py \
            --repo-root . \
            --lean-project-root lean/rcp_rclm_formal_core_v3 \
            --out artifacts/runtime_v3_phase_12c/pinned/phase_12c_closure.json \
            2>&1 | tee artifacts/runtime_v3_phase_12c/pinned/phase_12c_closure_stdout.log

      - name: Verify M2 promotion, frontier growth, and ledger
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("artifacts/runtime_v3_phase_12c/pinned/phase_12c_closure.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          assert report["accepted"] is True
          assert report["phase12a_recursive_rejection_retained"] is True
          assert report["phase12b_first_promotion_retained"] is True
          assert report["phase12c_second_rejection_retained"] is True
          assert report["rejection_preserved_m1"] is True
          assert report["m1_to_m2_candidate_realized"] is True
          assert report["m1_to_m2_frontier_expansion"] is True
          assert report["m1_to_m2_atomic_promotion"] is True
          assert report["frontier_cardinality_before"] == 4
          assert report["frontier_cardinality_after"] == 5
          assert report["accepted_phase12_promotions"] == 2
          assert report["rejected_phase12_attempts"] == 2
          assert report["manual_repairs"] == 0
          assert report["heldout_material_consumed"] is False
          assert report["phase12c_memory_retrieval_promotion_closed"] is True
          assert report["phase12_exit_closed"] is False
          PY

      - name: Retain pinned Phase 12C evidence
        shell: bash
        run: |
          set -euo pipefail
          cp lean/rcp_rclm_formal_core_v3/audit-results-phase12c-closure/* \
            artifacts/runtime_v3_phase_12c/pinned/
          cp lean/rcp_rclm_formal_core_v2/lake-manifest.json \
            artifacts/runtime_v3_phase_12c/pinned/formal-core-v2-lake-manifest.json
          cp lean/rcp_rclm_formal_core_v3/lake-manifest.json \
            artifacts/runtime_v3_phase_12c/pinned/formal-core-v3-lake-manifest.json
          {
            echo "commit=${GITHUB_SHA}"
            echo "toolchain=$(cat lean/rcp_rclm_formal_core_v3/lean-toolchain)"
            echo "accepted_phase12_promotions=2"
            echo "rejected_phase12_attempts=2"
            echo "frontier_cardinality=5"
            echo "training_invocations_for_phase12c=0"
            echo "manual_repairs=0"
            echo "heldout_material_consumed=false"
          } > artifacts/runtime_v3_phase_12c/pinned/metadata.txt

      - name: Upload pinned Phase 12C closure evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12c-pinned-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12c/pinned/
          if-no-files-found: error
          retention-days: 90

  closure:
    name: Close Phase 12C memory/retrieval promotion slice
    needs:
      - portable
      - pinned-closure
    runs-on: ubuntu-latest

    steps:
      - name: Emit Phase 12C closure record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime_v3_phase_12c/final
          {
            echo "phase=12"
            echo "slice=12C"
            echo "commit=${GITHUB_SHA}"
            echo "cross_platform=success"
            echo "m1_generator_proposal_authority=success"
            echo "second_rejection_preserved_m1=success"
            echo "memory_retrieval_realization=success"
            echo "frontier_cardinality=5"
            echo "accepted_phase12_promotions=2"
            echo "rejected_phase12_attempts=2"
            echo "manual_repairs=0"
            echo "phase12c_memory_retrieval_promotion_closed=true"
            echo "phase12_exit_closed=false"
          } > artifacts/runtime_v3_phase_12c/final/closure.txt

      - name: Upload final Phase 12C closure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-v3-phase-12c-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime_v3_phase_12c/final/
          if-no-files-found: error
          retention-days: 90
