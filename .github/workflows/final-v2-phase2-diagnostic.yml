name: Final v2 Phase 2 diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/final-v2-phase2-diagnostic.yml"
  push:
    branches:
      - agent/rcp-rclm-v2-final-documentation
    paths:
      - ".github/workflows/final-v2-phase2-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: agent/rcp-rclm-v2-final-documentation
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check -e python/rcp_rclm_runtime_v2
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: lean/rcp_rclm_formal_core_v2
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve and build pinned project
        shell: bash
        run: |
          set -euo pipefail
          cd lean/rcp_rclm_formal_core_v2
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update
          lake exe cache get
          lake build
      - name: Capture differential conformance output
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/final-v2-phase2-diagnostic
          python python/rcp_rclm_runtime_v2/tools/run_phase2_conformance.py \
            --repo-root . \
            --outdir artifacts/final-v2-phase2-diagnostic/conformance \
            --timeout-seconds 180 \
            > artifacts/final-v2-phase2-diagnostic/stdout.log \
            2> artifacts/final-v2-phase2-diagnostic/stderr.log
          status=$?
          echo "$status" > artifacts/final-v2-phase2-diagnostic/exit-status.txt
          cat artifacts/final-v2-phase2-diagnostic/stdout.log
          cat artifacts/final-v2-phase2-diagnostic/stderr.log >&2
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: final-v2-phase2-diagnostic-${{ github.run_id }}
          path: artifacts/final-v2-phase2-diagnostic/
          if-no-files-found: error
          retention-days: 3
